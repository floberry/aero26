<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⛏️ 마크 물리학 - 돌림힘!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&family=Black+Han+Sans&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: #5BB8F5;
  min-height: 100vh;
  font-family: 'Jua', sans-serif;
  overflow-x: hidden;
}

/* ── 하늘 배경 + 구름 ── */
.sky-bg {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(180deg, #5BB8F5 0%, #A8DFFF 60%, #C8EDFF 100%);
  overflow: hidden;
}
.cloud {
  position: absolute;
  background: white;
  border-radius: 4px;
  opacity: .92;
  animation: driftCloud linear infinite;
}
@keyframes driftCloud {
  from { transform: translateX(-300px); }
  to   { transform: translateX(110vw); }
}

.page {
  position: relative; z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: 10px 10px 90px;
}

/* ════════ TITLE ════════ */
.title-card {
  background: #FFEE58;
  border: 4px solid #F9A825;
  border-radius: 8px;
  box-shadow: 0 6px 0 #E65100;
  padding: 14px 12px 12px;
  text-align: center;
  margin-bottom: 11px;
}
.title-card h1 {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 24px;
  color: #1B5E20;
  text-shadow: 2px 3px 0 #A5D6A7;
  letter-spacing: 1px;
}
.title-sub {
  font-size: 13px; color: #5D4037; margin-top: 3px; font-weight: 700;
}

/* ── mob parade ── */
.mob-row {
  display: flex; justify-content: center; gap: 6px; margin-top: 10px;
}
.mc-mob {
  image-rendering: pixelated;
  width: 48px; height: 48px;
  animation: boing .85s ease-in-out infinite alternate;
  flex-shrink: 0;
}
.mc-mob:nth-child(2){animation-delay:.12s}
.mc-mob:nth-child(3){animation-delay:.24s}
.mc-mob:nth-child(4){animation-delay:.36s}
.mc-mob:nth-child(5){animation-delay:.48s}
@keyframes boing {
  from { transform: translateY(0) scaleY(1); }
  to   { transform: translateY(-10px) scaleY(1.08); }
}

/* ════════ XP ════════ */
.xp-bar {
  display: flex; align-items: center; gap: 8px;
  background: #43A047;
  border: 3px solid #1B5E20;
  border-radius: 6px;
  box-shadow: 0 4px 0 #1B5E20;
  padding: 7px 10px;
  margin-bottom: 11px;
}
.xp-label { font-size: 13px; color: #F9FBE7; white-space: nowrap; }
.xp-track { flex:1; height:13px; background:#1B5E20; border-radius:3px; border:2px solid #0A3B0A; overflow:hidden; }
.xp-fill  { height:100%; background:linear-gradient(90deg,#CCFF90,#76FF03); border-radius:2px; transition:width .4s; width:0%; }
.xp-num   { font-size:13px; color:#F9FBE7; white-space:nowrap; }

/* ════════ CARDS ════════ */
.card {
  border-radius: 8px;
  border: 3px solid;
  padding: 12px;
  margin-bottom: 11px;
}
.card-sky   { background:#E1F5FE; border-color:#0288D1; box-shadow:0 5px 0 #01579B; }
.card-lime  { background:#F9FBE7; border-color:#8BC34A; box-shadow:0 5px 0 #558B2F; }
.card-peach { background:#FFF8E1; border-color:#FFB300; box-shadow:0 5px 0 #E65100; }
.card-title {
  font-family:'Black Han Sans',sans-serif;
  font-size: 15px;
  margin-bottom: 9px;
}
.card-sky   .card-title { color:#01579B; }
.card-lime  .card-title { color:#33691E; }
.card-peach .card-title { color:#BF360C; }

/* ════════ DIAGRAM — BIG ════════ */
.dia-wrap {
  background: #B3E5FC;
  border: 3px solid #0288D1;
  border-radius: 6px;
  overflow: hidden;
  width: 100%;
}
.dia-wrap svg { display:block; width:100%; }

/* ════════ VALUE CHIPS ════════ */
.chips { display:flex; flex-wrap:wrap; gap:7px; margin-top:6px; }
.chip {
  background:#FFF9C4; border:2px solid #F9A825;
  border-radius:20px; padding:5px 13px;
  font-size:14px; color:#4E342E; font-weight:700;
  box-shadow:0 3px 0 #E65100;
}
.chip b { color:#D84315; }

/* ════════ OPTIONS ════════ */
.opts { display:flex; flex-direction:column; gap:9px; }
.opt-btn {
  display:flex; align-items:flex-start; gap:10px;
  background:white; border:3px solid #FFB300;
  border-radius:8px; padding:12px 12px;
  font-family:'Jua',sans-serif; font-size:14px; color:#3E2723;
  text-align:left; cursor:pointer; line-height:1.55;
  box-shadow:0 4px 0 #E65100;
  transition:background .12s, border-color .12s, transform .08s;
}
.opt-btn:active { transform:translateY(2px); box-shadow:0 2px 0 #E65100; }
.opt-btn.sel   { background:#FFF9C4; border-color:#F57F17; }
.opt-btn.ok    { background:#DCEDC8; border-color:#558B2F; box-shadow:0 4px 0 #33691E; }
.opt-btn.ng    { background:#FFCCBC; border-color:#BF360C; box-shadow:0 4px 0 #7F0000; }
.opt-badge {
  flex-shrink:0;
  width:30px; height:30px; border-radius:6px;
  background:#FFEE58; border:2px solid #F9A825;
  display:flex; align-items:center; justify-content:center;
  font-family:'Black Han Sans',sans-serif; font-size:14px; color:#5D4037;
  box-shadow:0 2px 0 #E65100; margin-top:1px;
}
.opt-btn.sel .opt-badge { background:#42A5F5; border-color:#0D47A1; color:white; }
.opt-btn.ok  .opt-badge { background:#66BB6A; border-color:#2E7D32; color:white; }
.opt-btn.ng  .opt-badge { background:#EF5350; border-color:#B71C1C; color:white; }

/* ════════ HINT ════════ */
.hint-btn {
  display:inline-block; margin-top:10px;
  background:#FFF9C4; border:2px solid #FFB300;
  border-radius:20px; padding:6px 16px;
  font-size:13px; color:#E65100; font-weight:700;
  cursor:pointer; box-shadow:0 3px 0 #E65100;
  transition:transform .08s;
}
.hint-btn:active { transform:translateY(1px); }
.hint-content {
  display:none; margin-top:8px;
  background:#FFFDE7; border:2px dashed #FFB300;
  border-radius:8px; padding:10px 12px;
  font-size:13px; color:#4E342E; line-height:1.75;
}
.hint-content.open { display:block; }

/* ════════ BUTTONS ════════ */
.btn-row { display:flex; gap:9px; margin-top:12px; }
.mc-btn {
  flex:1; padding:15px 8px;
  border:none; border-radius:8px;
  font-family:'Black Han Sans',sans-serif; font-size:16px;
  cursor:pointer; transition:transform .08s;
  letter-spacing:.5px;
}
.mc-btn:active { transform:translateY(3px); }
.btn-green { background:#43A047; color:white; box-shadow:0 6px 0 #1B5E20; text-shadow:1px 2px 0 rgba(0,0,0,.3); }
.btn-green:active { box-shadow:0 2px 0 #1B5E20; }
.btn-orange { background:#FB8C00; color:white; box-shadow:0 6px 0 #BF360C; text-shadow:1px 2px 0 rgba(0,0,0,.3); }
.btn-orange:active { box-shadow:0 2px 0 #BF360C; }

/* ════════ FEEDBACK ════════ */
.feedback {
  display:none; border-radius:8px; padding:14px;
  margin-top:11px; font-size:13px; line-height:1.8;
  animation:popIn .22s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{opacity:0;transform:scale(.94)} to{opacity:1;transform:scale(1)} }
.feedback.show { display:block; }
.fb-ok { background:#F1F8E9; border:3px solid #558B2F; box-shadow:0 5px 0 #33691E; }
.fb-ng { background:#FFF3E0; border:3px solid #FB8C00; box-shadow:0 5px 0 #BF360C; }
.fb-head {
  font-family:'Black Han Sans',sans-serif; font-size:18px; margin-bottom:10px;
}
.fb-ok .fb-head { color:#2E7D32; }
.fb-ng .fb-head { color:#BF360C; }
.fb-step {
  background:white; border-left:4px solid #FFEE58;
  border-radius:0 8px 8px 0; padding:8px 11px; margin:6px 0;
  font-size:13px; color:#3E2723; box-shadow:0 2px 0 rgba(0,0,0,.06);
}
.hl  { color:#D84315; font-weight:900; }
.hl2 { color:#0D47A1; font-weight:900; }

.react-row {
  display:flex; justify-content:center; gap:8px; margin:8px 0;
}
.react-row svg {
  image-rendering:pixelated;
  animation:boing .7s ease-in-out infinite alternate;
}
.react-row svg:nth-child(2){animation-delay:.15s}
.react-row svg:nth-child(3){animation-delay:.30s}
</style>
</head>

function makeMobSVG(key, px=52) {
  const mob = MOBS[key];
  if (!mob) return '';
  const s = px / mob.size;
  let r = '';
  for (const [y, x1, x2, c] of mob.px) {
    r += `<rect x="${x1*s}" y="${y*s}" width="${(x2-x1)*s}" height="${s}" fill="${c}"/>`;
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${px}" height="${px}" viewBox="0 0 ${px} ${px}" style="image-rendering:pixelated">${r}</svg>`;
}

/* ══════════════════════════════════════
   GAME LOGIC
══════════════════════════════════════ */
let W, d1, d2, T;
let opts=[], selected=new Set(), answered=false;
let score=0, total=0, hintOpen=false;

const rand = arr => arr[Math.floor(Math.random()*arr.length)];
function shuffled(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function gen() {
  const Ws=[20,30,40,50,60,80,100,120];
  W=rand(Ws);
  const D1=[0.5,1,1.5,2];
  d1=rand(D1);
  // d2 > d1, T integer
  const cands=[];
  for(let n=3;n<=16;n++){
    const dc=n*0.5;
    if(dc<=d1) continue;
    if(dc>5) break;
    const Tc=W*d1/dc;
    if(Number.isInteger(Tc)&&Tc>0&&Tc!==W) cands.push(dc);
  }
  d2=cands.length?rand(cands):d1*2;
  T=Math.round(W*d1/d2);

  // 3 options — randomly wrong
  const flipN = Math.random()<0.25?0:Math.random()<0.5?1:2;
  const flipIdx = new Set(shuffled([0,1,2]).slice(0,flipN));

  opts=[
    buildOpt(0,'ㄱ',flipIdx,
      `물체가 막대를 당기는 힘의 크기는 <b>${W} N</b>이다.`,
      `작용·반작용: 물체 무게 = 막대를 당기는 힘 = <b class="hl">${W} N</b>`,
      ()=>`물체가 막대를 당기는 힘의 크기는 <b>${W+(rand([1,-1])*(rand([10,20])))>0?W+(rand([1,-1]))*(rand([10,20])):W+10} N</b>이다.`
    ),
    buildOpt(1,'ㄴ',flipIdx,
      `P점을 회전축으로 하는 무게의 돌림힘은 <b>${W*d1} N·m</b>이다.`,
      `τ = ${W} N × ${d1} m = <b class="hl">${W*d1} N·m</b>`,
      ()=>`P점을 회전축으로 하는 무게의 돌림힘은 <b>${W*d1+rand([W,d1*10])>0?W*d1+W:W*d1-d1*5||W*d1+W} N·m</b>이다.`
    ),
    buildOpt(2,'ㄷ',flipIdx,
      `실이 막대를 당기는 힘의 크기는 <b>${T} N</b>이다.`,
      `평형: T×${d2}=W×${d1} → T = <b class="hl">${T} N</b>`,
      ()=>`실이 막대를 당기는 힘의 크기는 <b>${T+(rand([1,-1]))*(rand([10,20]))>0?T+10:T+20} N</b>이다.`
    )
  ];

  selected=new Set(); answered=false; hintOpen=false;
  updateDia(); renderOpts();
  document.getElementById('feedbackBox').className='feedback';
  document.getElementById('hintBox').className='hint-box';
  document.getElementById('hintBtn').textContent='💡 힌트 보기';
  setHint();
}

function buildOpt(i,key,flipIdx,trueText,explain,wrongTextFn){
  const isCorrect=!flipIdx.has(i);
  return {key, isCorrect, text:isCorrect?trueText:wrongTextFn(), explain};
}

/* ── Diagram update ── */
function updateDia(){
  const PIVOT_X=75;
  const MAX_W=265; // max rod width in px
  const ppm=MAX_W/d2;
  const wx=PIVOT_X+d1*ppm;
  const tx=PIVOT_X+d2*ppm;
  const rodW=d2*ppm;

  // rod
  document.getElementById('rod').setAttribute('width',rodW);
  document.getElementById('rodSheen').setAttribute('width',rodW);

  // grain lines
  const grains=['gA','gB','gC','gD','gE'];
  const step=rodW/6;
  grains.forEach((id,i)=>{
    const el=document.getElementById(id);
    const gx=PIVOT_X+(i+1)*step;
    el.setAttribute('x1',gx);el.setAttribute('x2',gx);
    el.style.display=(gx<PIVOT_X+rodW&&gx>PIVOT_X)?'':'none';
  });

  // weight group
  const cx=wx; // center x of weight
  document.getElementById('wRope').setAttribute('x',cx-2);
  document.getElementById('wBody').setAttribute('x',cx-20);
  document.getElementById('wLid').setAttribute('x',cx-18);
  document.getElementById('wLidSheen').setAttribute('x',cx-18);
  document.getElementById('wRim').setAttribute('x',cx-20);
  document.getElementById('wLock').setAttribute('x',cx-5);
  document.getElementById('wLockHole').setAttribute('x',cx-2);
  document.getElementById('wTag').setAttribute('x',cx-25);
  document.getElementById('wText').setAttribute('x',cx);
  document.getElementById('wText').textContent=W+' N';

  // thread
  document.getElementById('thread').setAttribute('x1',tx);
  document.getElementById('thread').setAttribute('x2',tx);
  document.getElementById('tTop').setAttribute('x',tx-5);
  document.getElementById('tBot').setAttribute('cx',tx);

  // d1 arrow
  const d1m=(PIVOT_X+2+cx)/2;
  const d1line=document.querySelector('#d1Grp line');
  d1line.setAttribute('x1',PIVOT_X+2);d1line.setAttribute('x2',cx-2);
  const d1rect=document.querySelector('#d1Grp rect');
  d1rect.setAttribute('x',d1m-24);
  document.getElementById('d1Txt').setAttribute('x',d1m);
  document.getElementById('d1Txt').textContent=`${d1} m`;

  // d2 arrow
  const d2m=(PIVOT_X+2+tx)/2;
  const d2line=document.querySelector('#d2Grp line');
  d2line.setAttribute('x1',PIVOT_X+2);d2line.setAttribute('x2',tx-2);
  document.getElementById('d2Rect').setAttribute('x',d2m-28);
  document.getElementById('d2Txt').setAttribute('x',d2m);
  document.getElementById('d2Txt').textContent=`${d2} m`;

  // chips
  document.getElementById('cvW').textContent=W;
  document.getElementById('cvD1').textContent=d1;
  document.getElementById('cvD2').textContent=d2;
}

function renderOpts(){
  const list=document.getElementById('optList');
  list.innerHTML='';
  opts.forEach(o=>{
    const btn=document.createElement('button');
    btn.className='opt-btn'; btn.dataset.key=o.key;
    btn.innerHTML=`<span class="opt-badge">${o.key}</span><span>${o.text}</span>`;
    btn.onclick=()=>pick(o.key);
    list.appendChild(btn);
  });
}

function pick(key){
  if(answered)return;
  selected.has(key)?selected.delete(key):selected.add(key);
  document.querySelectorAll('.opt-btn').forEach(b=>{
    b.classList.toggle('sel',selected.has(b.dataset.key));
  });
}

function setHint(){
  document.getElementById('hintBox').innerHTML=
    `📐 돌림힘(τ) = 힘(F) × 팔의 길이(r)<br>
     ⚖️ 막대가 평형이면:<br>
     &nbsp;&nbsp;시계 방향 돌림힘 = 반시계 방향 돌림힘<br>
     &nbsp;&nbsp;<b>W × d₁ = T × d₂</b><br>
     🔑 T = W×d₁ ÷ d₂ 로 실의 장력을 구해봐!`;
}

function toggleHint(){
  hintOpen=!hintOpen;
  document.getElementById('hintBox').className='hint-content'+(hintOpen?' open':'');
  document.getElementById('hintBtn').textContent=hintOpen?'💡 힌트 닫기':'💡 힌트 보기';
}

function checkAnswer(){
  if(answered)return;
  if(selected.size===0){toast('선지를 먼저 선택해봐! 🐷');return;}
  answered=true; total++;
  const corrKeys=new Set(opts.filter(o=>o.isCorrect).map(o=>o.key));
  const ok=[...selected].every(k=>corrKeys.has(k))&&selected.size===corrKeys.size;
  if(ok)score++;
  updateXP();
  document.querySelectorAll('.opt-btn').forEach(b=>{
    const k=b.dataset.key;
    const o=opts.find(x=>x.key===k);
    b.classList.remove('sel');
    if(o.isCorrect)b.classList.add('ok');
    else if(selected.has(k))b.classList.add('ng');
  });
  showFeedback(ok,corrKeys);
  setTimeout(()=>document.getElementById('feedbackBox').scrollIntoView({behavior:'smooth',block:'nearest'}),150);
}

function showFeedback(ok,corrKeys){
  const box=document.getElementById('feedbackBox');
  box.className='feedback show '+(ok?'fb-ok':'fb-ng');
  document.getElementById('fbHead').textContent=ok?'🎉 정답! 완벽해요!':'💀 아쉬워요, 다시 도전!';

  // 반응 몹
  const rr=document.getElementById('reactRow');
  const mobList=ok?['cow','sheep','pig']:['zombie','creeper'];
  rr.innerHTML=mobList.map(m=>makeMobSVG(m,48)).join('');

  const ck=[...corrKeys].join(', ');
  let html=`<div class="fb-step">정답: <b class="hl">${ck}</b> &nbsp;|&nbsp; 내 선택: <b class="hl2">${[...selected].join(', ')||'없음'}</b></div>`;
  opts.forEach(o=>{
    html+=`<div class="fb-step"><b>${o.key}) ${o.isCorrect?'✅ 옳음':'❌ 틀림'}</b><br>${o.explain}</div>`;
  });
  html+=`<div class="fb-step">⚖️ <b>핵심 공식 총정리</b><br>W × d₁ = T × d₂<br>${W} × ${d1} = T × ${d2}<br>→ T = <b class="hl">${T} N</b></div>`;
  document.getElementById('fbBody').innerHTML=html;
}

function updateXP(){
  const p=total?score/total*100:0;
  document.getElementById('xpFill').style.width=p+'%';
  document.getElementById('xpNum').textContent=`${score} / ${total}`;
}

function newProblem(){gen();window.scrollTo({top:0,behavior:'smooth'});}

function toast(msg){
  const t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#FFEE58;color:#3E2723;font-family:Jua,sans-serif;font-size:15px;padding:10px 22px;border-radius:8px;border:2px solid #F9A825;z-index:9999;box-shadow:0 4px 0 #E65100;white-space:nowrap;';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1800);
}

/* ── Sky clouds ── */
function makeClouds(){
  const bg=document.getElementById('skyBg');
  for(let i=0;i<5;i++){
    const c=document.createElement('div');
    c.className='cloud';
    const w=55+Math.random()*80, h=18+Math.random()*18;
    const top=8+Math.random()*15;
    const dur=22+Math.random()*20;
    const delay=-Math.random()*dur;
    c.style.cssText=`width:${w}px;height:${h}px;top:${top}%;border-radius:5px;animation-duration:${dur}s;animation-delay:${delay}s;`;
    bg.appendChild(c);
  }
}

/* ── Mob parade ── */
function buildParade(){
  const row=document.getElementById('mobRow');
  ['cow','pig','sheep','creeper','zombie'].forEach((k,i)=>{
    const wrap=document.createElement('div');
    wrap.style.cssText=`animation:boing .85s ease-in-out infinite alternate;animation-delay:${i*0.12}s;`;
    wrap.innerHTML=makeMobSVG(k,48);
    row.appendChild(wrap);
  });
}

/* ── init ── */
makeClouds();
buildParade();
gen();
