<title>엘리베이터 역학 — 물리학Ⅱ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Jua&family=JetBrains+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Noto Sans KR',sans-serif;
  min-height:100vh;overflow-x:hidden;
  background:#f5f0e8;
  position:relative;
}
50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* ── FLOATING DECORATIONS ── */


/* Clouds */

100%{transform:translateX(110vw)}}
100%{transform:translateX(-160px)}}
100%{transform:translateX(110vw)}}






/* Hearts */
50%{transform:translateY(-22px) scale(1.12);opacity:1}100%{transform:translateY(0) scale(1);opacity:0.85}}











/* ── TITLE BANNER ── */


.title-rainbow span{display:inline-block;}







/* Rainbow underline */


/* ── RAINBOW ARCH DIVIDERS ── */



/* ── HEADER ── */
.header{
  position:sticky;top:0;z-index:100;
  background:#3d3530;
  padding:0 14px;height:52px;display:flex;align-items:center;gap:10px;
  box-shadow:0 3px 16px rgba(180,100,200,0.3);
  border-bottom:3px solid rgba(255,255,255,0.6);
}
.header-icon{width:34px;height:34px;background:rgba(255,255,255,0.95);border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:18px;}
.header-title{font-size:14px;font-weight:900;color:#f5f0e8;letter-spacing:-0.3px;}
.header-sub{font-size:10px;color:rgba(255,255,255,0.9);}
.header-badge{margin-left:auto;background:rgba(255,255,255,0.92);border-radius:20px;
  padding:3px 12px;font-size:11px;font-weight:900;
  background:linear-gradient(90deg,#ff3b3b,#ff8c00,#e6c000,#18b04c,#1a6fff,#9b2aff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* ── CONTENT ── */
.content{padding:10px 14px 36px;display:flex;flex-direction:column;gap:14px;position:relative;z-index:1;}

/* ── CARDS ── */
.card{
  background:#fffdf8;
  border:2px solid #ddd8cc;
  border-radius:22px;overflow:hidden;
  box-shadow:0 4px 24px rgba(180,120,255,0.13),0 1px 6px rgba(0,0,0,0.07);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
}
.card-header{
  padding:11px 16px 9px;border-bottom:2px solid rgba(200,180,255,0.25);
  display:flex;align-items:center;gap:8px;
  background:#ece8e0;
}
.card-title{font-size:11px;font-weight:900;letter-spacing:0.8px;text-transform:uppercase;color:#5a4a3a;}
.card-body{padding:14px 16px;}
.card-dot{width:10px;height:10px;border-radius:50%;}

/* ── PROBLEM TEXT ── */
.problem-text{font-size:13.5px;line-height:1.9;color:#2d2060;word-break:keep-all;}
.problem-text strong{font-weight:900;
  background:linear-gradient(90deg,#ff6b00,#e6c000);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.highlight-box{margin-top:10px;
  background:linear-gradient(135deg,rgba(255,230,240,0.7),rgba(220,230,255,0.7));
  border:2px solid rgba(200,160,255,0.4);border-radius:14px;padding:10px 14px;
  font-size:12.5px;color:#4a3080;line-height:1.75;}
.highlight-box span{font-weight:900;
  background:linear-gradient(90deg,#1a6fff,#9b2aff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* ── GRAPHS ── */
.graphs-row{display:flex;flex-direction:column;gap:14px;}
.elevator-big-wrap{display:flex;justify-content:center;margin-bottom:6px;}
.graph-wrap{display:flex;flex-direction:column;gap:5px;}
.graph-label{text-align:center;font-size:11px;font-weight:700;color:#7040c0;}
.elevator-container{display:flex;justify-content:center;}
canvas{border-radius:10px;display:block;width:100%;}

/* ── ANSWER OPTIONS ── */
.answer-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.answer-option{
  background:#fffdf8;
  border:2px solid #ddd8cc;
  border-radius:16px;padding:10px 9px 8px;cursor:pointer;
  transition:all 0.2s;-webkit-tap-highlight-color:transparent;
  backdrop-filter:blur(6px);}
.answer-option:active{transform:scale(0.95);}
.answer-option.selected{border-color:#6dcfff;background:rgba(110,200,255,0.2);
  box-shadow:0 0 0 3px rgba(110,200,255,0.25);}
.answer-option.correct{border-color:#18b04c!important;background:rgba(24,176,76,0.14)!important;
  box-shadow:0 0 0 3px rgba(24,176,76,0.25)!important;}
.answer-option.wrong{border-color:#ff3b3b!important;background:rgba(255,59,59,0.1)!important;}
.option-num{font-size:14px;font-weight:900;margin-bottom:3px;color:#3d3530;}
.answer-option.correct .option-num{background:none;-webkit-text-fill-color:#18b04c;}
.answer-option.wrong .option-num{background:none;-webkit-text-fill-color:#ff3b3b;}
.option-canvas{width:100%;border-radius:7px;}

/* ── SCORE ── */
.score-strip{
  display:flex;gap:0;border-top:2px solid rgba(200,180,255,0.25);
  background:#ece8e0;
}
.score-item{flex:1;text-align:center;padding:10px 4px;}
.score-val{font-size:22px;font-weight:900;font-family:'JetBrains Mono',monospace;}
.sv-c{color:#18b04c;} .sv-w{color:#ff3b3b;} .sv-t{color:#1a6fff;}
.score-lbl{font-size:9px;color:#9080b0;letter-spacing:0.5px;text-transform:uppercase;}
.score-div{width:2px;background:rgba(200,180,255,0.25);}

/* ── BUTTONS ── */
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{padding:15px;border-radius:16px;border:none;font-family:'Noto Sans KR',sans-serif;
  font-size:13px;font-weight:900;cursor:pointer;transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;letter-spacing:-0.3px;}
.btn:active{transform:scale(0.95);}
.btn-new{
  background:#ece8e0;border:2px solid #c8c0b4;
  color:#5a4a3a;box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.btn-check{
  background:#3d3530;
  color:#f5f0e8;box-shadow:0 4px 16px rgba(0,0,0,0.18);}
.btn-check:disabled{opacity:0.4;cursor:not-allowed;animation:none;
  background:rgba(180,170,200,0.35);color:#aaa;box-shadow:none;}

/* ── FEEDBACK ── */
.feedback{display:none;border-radius:20px;overflow:hidden;}
.feedback.show{display:block;animation:fadeUp 0.3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.feedback-top{padding:14px 16px;display:flex;align-items:center;gap:10px;}
.fb-ok{background:linear-gradient(135deg,rgba(24,176,76,0.15),rgba(100,220,150,0.1));
  border:2px solid rgba(24,176,76,0.45);border-radius:20px 20px 0 0;}
.fb-ng{background:linear-gradient(135deg,rgba(255,59,59,0.12),rgba(255,100,100,0.08));
  border:2px solid rgba(255,59,59,0.4);border-radius:20px 20px 0 0;}
.fb-icon{font-size:28px;}
.fb-verdict{font-size:16px;font-weight:900;}
.fv-ok{color:#18b04c;} .fv-ng{color:#d42020;}
.sol-box{background:rgba(255,255,255,0.82);border:2px solid rgba(200,180,255,0.3);
  border-top:none;border-radius:0 0 20px 20px;padding:14px 16px;}
.sol-title{font-size:11px;font-weight:900;letter-spacing:0.8px;text-transform:uppercase;color:#9080b0;margin-bottom:12px;}
.sol-step{margin-bottom:12px;padding-bottom:12px;border-bottom:1.5px solid rgba(200,180,255,0.25);}
.sol-step:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.step-tag{display:inline-block;
  background:#3d3530;color:#f5f0e8;
  font-size:10px;font-weight:900;padding:2px 10px;border-radius:20px;margin-bottom:6px;}
.step-tag.key{background:#6a5a4a;}
.step-text{font-size:13px;line-height:1.85;color:#2d2060;word-break:keep-all;}
.step-text strong{font-weight:900;color:#d4600a;}
.formula{font-family:'JetBrains Mono',monospace;
  background:rgba(100,180,255,0.1);border:1.5px solid rgba(100,160,255,0.3);
  border-radius:8px;padding:8px 12px;font-size:12px;color:#1a3080;margin:6px 0;line-height:1.6;}
.ans-badge{display:inline-block;
  background:#18b04c;color:#fff;
  font-size:12px;font-weight:900;padding:4px 14px;border-radius:20px;margin-top:6px;}

/* ── HEART INLINE DECORATIONS ── */

</style>

    {f1:m*g,f2:m*(g+a2)},{f1:m*(g+a2),f2:m*(g+a2)},
    {f1:F1+2,f2:F2+2},{f1:F1-2,f2:F2-2},
  ];
  var ck=F1+'_'+F2,chosen=[];
  wrongs.sort(()=>Math.random()-0.5);
  for(var w of wrongs){var k=w.f1+'_'+w.f2;if(k!==ck&&!chosen.some(c=>c.f1+'_'+c.f2===k)){chosen.push(w);if(chosen.length===4)break;}}
  while(chosen.length<4)chosen.push({f1:F1+3,f2:F2+3});
  var pos=Math.floor(Math.random()*5);
  chosen.splice(pos,0,{f1:F1,f2:F2,ok:true});
  var opts=chosen.slice(0,5).map((o,i)=>({num:i+1,f1:o.f1,f2:o.f2!==undefined?o.f2:F2,ok:!!o.ok}));
  var ca=opts.findIndex(o=>o.ok)+1;
  return{m,g,a1,a2,t1:2,t2:4,gt:1,gf:m*(g+a1),F1,F2,opts,ca};
}

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function drawAccel(id,a1,a2,t1,t2,ht){
  var cv=document.getElementById(id);if(!cv)return;
  var dpr=window.devicePixelRatio||1,W=cv.offsetWidth||300,H=200;
  cv.width=W*dpr;cv.height=H*dpr;
  var ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
  var pad={t:18,r:12,b:28,l:36},gW=W-pad.l-pad.r,gH=H-pad.t-pad.b;

  // Rainbow gradient background
  var bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#fff0f5');bg.addColorStop(0.3,'#fff9e6');
  bg.addColorStop(0.6,'#e8f8f0');bg.addColorStop(1,'#e8f0ff');
  ctx.fillStyle=bg;rr(ctx,0,0,W,H,10);ctx.fill();

  // Clouds in bg
  function miniCloud(cx,cy,s){
    ctx.save();ctx.globalAlpha=0.65;
    [[0,0,16,9],[-11,-7,10,8],[11,-8,12,9]].forEach(function(arr){
      var dx=arr[0],dy=arr[1],rx=arr[2],ry=arr[3];
      ctx.fillStyle='white';ctx.beginPath();ctx.ellipse(cx+dx*s,cy+dy*s,rx*s,ry*s,0,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;ctx.restore();
  }
  miniCloud(W-24,16,0.7);
  miniCloud(18,18,0.6);

  var maxA=Math.max(Math.abs(a1),Math.abs(a2),5),minA=Math.min(a1,a2,0),rangeA=maxA-minA;
  var tX=t=>pad.l+(t/t2)*gW,tY=a=>pad.t+gH*((maxA-a)/rangeA);
  var zY=tY(0);

  // Subtle grid
  ctx.strokeStyle='rgba(180,160,220,0.22)';ctx.lineWidth=0.5;
  for(var i=0;i<=4;i++){var y=pad.t+(gH/4)*i;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+gW,y);ctx.stroke();}

  // Axes
  ctx.strokeStyle='#b0a0d0';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad.l,zY);ctx.lineTo(pad.l+gW,zY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,pad.t+gH);ctx.stroke();

  // Labels
  ctx.fillStyle='#7040c0';ctx.font='9px "JetBrains Mono",monospace';
  ctx.textAlign='center';
  [t1,t2].forEach(t=>ctx.fillText(t,tX(t),H-5));
  ctx.fillText('시간(s)',pad.l+gW-10,H-5);
  ctx.textAlign='right';
  [a1,a2].filter((v,i,a)=>a.indexOf(v)===i).forEach(av=>ctx.fillText(av,pad.l-3,tY(av)+3));

  // Rainbow fill
  var fillGrad=ctx.createLinearGradient(tX(0),0,tX(t2),0);
  RB.forEach((c,i)=>fillGrad.addColorStop(i/5,c+'30'));
  ctx.fillStyle=fillGrad;
  ctx.beginPath();ctx.moveTo(tX(0),zY);ctx.lineTo(tX(0),tY(a1));ctx.lineTo(tX(t1),tY(a1));
  ctx.lineTo(tX(t1),tY(a2));ctx.lineTo(tX(t2),tY(a2));ctx.lineTo(tX(t2),zY);ctx.closePath();ctx.fill();

  // Rainbow stroke (multi-color overlay)
  var segs=[[tX(0),tY(a1),tX(t1),tY(a1)],[tX(t1),tY(a1),tX(t1),tY(a2)],[tX(t1),tY(a2),tX(t2),tY(a2)]];
  segs.forEach(function(seg,si){
    var x1=seg[0],y1=seg[1],x2=seg[2],y2=seg[3];
    var lg=ctx.createLinearGradient(x1,y1,x2,y2);
    lg.addColorStop(0,RB[(si*2)%6]);lg.addColorStop(1,RB[(si*2+2)%6]);
    ctx.strokeStyle=lg;ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  });

  // Dots with rainbow colors
  [[0,a1],[t1,a1],[t1,a2],[t2,a2]].forEach(function(pt,i){var t=pt[0],a=pt[1];
    ctx.beginPath();ctx.arc(tX(t),tY(a),4.5,0,Math.PI*2);
    ctx.fillStyle=RB[i*2%6];ctx.fill();
    ctx.strokeStyle='white';ctx.lineWidth=1.5;ctx.stroke();
  });

  // Highlight time dashed line
  if(ht!==null){
    var hx=tX(ht);
    ctx.strokeStyle='#e6c000';ctx.lineWidth=1.8;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(hx,pad.t);ctx.lineTo(hx,pad.t+gH);ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath();ctx.arc(hx,tY(a1),5.5,0,Math.PI*2);
    ctx.fillStyle='#e6c000';ctx.fill();
    ctx.strokeStyle='white';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='#7040c0';ctx.textAlign='center';ctx.fillText(ht+'s',hx,pad.t-4);
  }
}

function drawForce(cv,f1,f2,t1,t2){
  var dpr=window.devicePixelRatio||1,W=cv.offsetWidth||130,H=88;
  cv.width=W*dpr;cv.height=H*dpr;
  var ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
  var pad={t:10,r:8,b:22,l:28},gW=W-pad.l-pad.r,gH=H-pad.t-pad.b;
  // Rainbow bg
  var bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#fff5f8');bg.addColorStop(0.5,'#f5f0ff');bg.addColorStop(1,'#f0f8ff');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // mini cloud
  [[W-14,9,8,5],[W-20,6,6,5],[W-8,6,7,6]].forEach(function(c){var cx=c[0],cy=c[1],rx=c[2],ry=c[3];
    ctx.fillStyle='rgba(255,255,255,0.85)';ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.fill();
  });
  var maxF=Math.max(f1,f2,10)+2,minF=Math.min(f1,f2,0),rangeF=maxF-minF;
  var tX=t=>pad.l+(t/t2)*gW,tY=f=>pad.t+gH*((maxF-f)/rangeF),zY=tY(0);
  ctx.strokeStyle='#b0a0d0';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(pad.l,zY);ctx.lineTo(pad.l+gW,zY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,pad.t+gH);ctx.stroke();
  ctx.fillStyle='#7040c0';ctx.font='8px "JetBrains Mono",monospace';
  ctx.textAlign='center';
  [t1,t2].forEach(t=>ctx.fillText(t,tX(t),H-4));
  ctx.textAlign='right';
  [f1,f2].filter((v,i,a)=>a.indexOf(v)===i).forEach(fv=>ctx.fillText(fv,pad.l-2,tY(fv)+3));
  // fill
  ctx.fillStyle='rgba(138,43,226,0.12)';
  ctx.beginPath();ctx.moveTo(tX(0),zY);ctx.lineTo(tX(0),tY(f1));ctx.lineTo(tX(t1),tY(f1));
  ctx.lineTo(tX(t1),tY(f2));ctx.lineTo(tX(t2),tY(f2));ctx.lineTo(tX(t2),zY);ctx.closePath();ctx.fill();
  // stroke purple
  [[tX(0),tY(f1),tX(t1),tY(f1)],[tX(t1),tY(f1),tX(t1),tY(f2)],[tX(t1),tY(f2),tX(t2),tY(f2)]].forEach(function(sg,si){var x1=sg[0],y1=sg[1],x2=sg[2],y2=sg[3];
    ctx.strokeStyle='#7b2ff7';ctx.lineWidth=2.2;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  });
}

var NUMS=['①','②','③','④','⑤'];

function buildUI(p){
  document.getElementById('problemText').innerHTML=
    '질량이 <strong>'+p.m+'kg</strong>인 물체 A가 놓여 있는 엘리베이터가 연직 위 방향으로 운동한다. 그림 (나)는 엘리베이터의 가속도를 시간에 따라 나타낸 것이고, 연직 위 방향의 가속도를 양(+)으로 표시한다. <strong>'+p.gt+'초</strong>일 때 A가 엘리베이터 바닥을 누르는 힘의 크기는 <strong>'+p.gf+'N</strong>이다. <span style="color:#8a7a6a;font-size:12.5px;">(단, 엘리자베스는 없다고 생각한다.)</span>';
  document.getElementById('conditionBox').innerHTML=
    '<span>⚡ 조건</span> m='+p.m+'kg · g='+p.g+'m/s²<br>'+
    '0~'+p.t1+'초: <span>'+p.a1+' m/s²</span> · '+p.t1+'~'+p.t2+'초: <span>'+p.a2+' m/s²</span><br>'+
    p.gt+'초일 때 바닥 반력: <span>'+p.gf+'N</span>';
  setTimeout(()=>drawAccel('accelCanvas',p.a1,p.a2,p.t1,p.t2,p.gt),50);

  var grid=document.getElementById('answerGrid');grid.innerHTML='';
  p.opts.forEach((opt,i)=>{
    var div=document.createElement('div');div.className='answer-option';div.id='opt'+(i+1);
    div.onclick=()=>pick(i+1);
    div.innerHTML='<div class="option-num">'+NUMS[i]+'</div>'+
      '<canvas class="option-canvas" id="oc'+(i+1)+'" height="88"></canvas>'+
      '<div style="font-size:9px;color:#9080b0;margin-top:3px;font-family:\'JetBrains Mono\',monospace;">'+
      '0~'+p.t1+'s:'+opt.f1+'N · '+p.t1+'~'+p.t2+'s:'+opt.f2+'N</div>';
    grid.appendChild(div);
    setTimeout(()=>{var c=document.getElementById('oc'+(i+1));drawForce(c,opt.f1,opt.f2,p.t1,p.t2);},80+i*20);
  });
  sel=-1;checked=false;
  document.getElementById('checkBtn').disabled=true;
  document.getElementById('feedback').className='feedback';
}

        var vx=(Math.random()-0.5)*18,vy=-(12+Math.random()*10);
        var grav=0.7,px=cx,py=cy,rot=0,vrot=(Math.random()-0.5)*20;
        var floor=window.innerHeight-sz;
        var bounces=0;
        function animBounce(){
          vx*=0.98; vy+=grav; py+=vy; px+=vx; rot+=vrot;
          if(py>=floor){py=floor;vy*=-0.55;vx*=0.85;vrot*=0.7;bounces++;}
          if(px<0){px=0;vx=Math.abs(vx);}
          if(px>window.innerWidth-sz){px=window.innerWidth-sz;vx=-Math.abs(vx);}
          m.style.left=px+'px';m.style.top=py+'px';
          m.style.transform='translate(-50%,-50%) rotate('+rot+'deg)';
          m.style.opacity=(bounces<3)?'1':''+Math.max(0,1-(bounces-3)*0.35);
          if(bounces<4 && py<floor+2 || Math.abs(vy)>1){requestAnimationFrame(animBounce);}
          else{setTimeout(function(){m.style.transition='opacity 0.4s';m.style.opacity='0';setTimeout(function(){m.remove();},400);},200);}
        }
        m.style.left=px+'px';m.style.top=py+'px';
        requestAnimationFrame(animBounce);
      } else {
        var angle=(i/count)*Math.PI*2,dist=55+Math.random()*38;
        var tx=Math.cos(angle)*dist,ty=Math.sin(angle)*dist;
        m.style.transform='translate(-50%,-50%) scale(0)';
        m.style.transition='transform 0.42s cubic-bezier(.17,.67,.35,1.3) '+(i*0.04)+'s,opacity 0.3s ease 0.35s';
        requestAnimationFrame(function(){requestAnimationFrame(function(){
          m.style.transform='translate(calc(-50% + '+tx+'px),calc(-50% + '+ty+'px)) scale(1) rotate('+Math.floor(Math.random()*30-15)+'deg)';
        });});
        setTimeout(function(){m.style.opacity='0';},340+i*45);
        setTimeout(function(){m.remove();},820);
      }
    })(i);
  }
}

function pick(n){
  if(checked)return;sel=n;
  document.querySelectorAll('.answer-option').forEach((el,i)=>{
    el.classList.toggle('selected',i+1===n);
    if(i+1===n) spawnHeart(el);
  });
  document.getElementById('checkBtn').disabled=false;
}

function checkAnswer(){
  if(sel<0||checked)return;
  checked=true;
  var ok=sel===prob.ca;
  if(ok)sC++;else sW++;sT++;
  document.getElementById('sc').textContent=sC;
  document.getElementById('sw').textContent=sW;
  document.getElementById('st').textContent=sT;
  document.querySelectorAll('.answer-option').forEach((el,i)=>{
    if(i+1===prob.ca)el.classList.add('correct');
    else if(i+1===sel&&!ok)el.classList.add('wrong');
    el.classList.remove('selected');
  });
  var fb=document.getElementById('feedback');
  document.getElementById('fbIcon').textContent=ok?'✅':'❌';
  var fv=document.getElementById('fbVerdict');
  fv.className='fb-verdict '+(ok?'fv-ok':'fv-ng');
  fv.textContent=ok?'정답입니다! 🎉':'오답입니다';
  if(!ok) setTimeout(showWrongFace, 400); else setTimeout(showCorrectFace, 400);
  document.getElementById('fbSub').textContent=
    ok?NUMS[sel-1]+' 선택 → 정확합니다!':
       NUMS[sel-1]+' 선택 → 정답은 '+NUMS[prob.ca-1]+'번입니다.';
  document.getElementById('fbTop').className='feedback-top '+(ok?'fb-ok':'fb-ng');
  document.getElementById('solBox').innerHTML=buildSol(prob);
  fb.className='feedback show';
  setTimeout(()=>fb.scrollIntoView({behavior:'smooth',block:'start'}),100);
}

function buildSol(p){
  return '<div class="sol-title">📐 풀이 과정</div>'+
    '<div class="sol-step"><div class="step-tag">STEP 1 · 운동 방정식</div>'+
    '<div class="step-text">물체 A에 작용하는 힘: <strong>중력(mg ↓)</strong> + <strong>수직항력(N ↑)</strong><br>뉴턴 제2법칙 (위 방향 +)</div>'+
    '<div class="formula">N − mg = ma  →  N = m(g + a)</div></div>'+
    '<div class="sol-step"><div class="step-tag">STEP 2 · 0~'+p.t1+'초 (a₁='+p.a1+' m/s²)</div>'+
    '<div class="formula">N = '+p.m+'×('+p.g+'+'+p.a1+') = <strong>'+p.F1+'N</strong></div>'+
    '<div class="step-text">'+(p.F1===p.gf?'✓ 주어진 조건 '+p.gf+'N과 일치':'')+'</div></div>'+
    '<div class="sol-step"><div class="step-tag">STEP 3 · '+p.t1+'~'+p.t2+'초 (a₂='+p.a2+' m/s²)</div>'+
    '<div class="formula">N = '+p.m+'×('+p.g+'+'+p.a2+') = <strong>'+p.F2+'N</strong></div></div>'+
    '<div class="sol-step"><div class="step-tag">결론</div>'+
    '<div class="step-text">0~'+p.t1+'초: <strong>'+p.F1+'N</strong> (일정) → '+p.t1+'~'+p.t2+'초: <strong>'+p.F2+'N</strong> (일정)</div>'+
    '<div><span class="ans-badge">정답: '+NUMS[p.ca-1]+'번</span></div></div>'+
    '<div class="sol-step" style="border:none;padding-bottom:0;"><div class="step-tag key">핵심 개념</div>'+
    '<div class="step-text" style="color:#6040a0;">가속도 일정 → 반력 일정 (계단 그래프)<br>'+
    '위 가속 ↑ → 반력 > mg (겉보기 무게 증가)<br>'+
    '아래 가속 ↓ → 반력 < mg (겉보기 무게 감소)</div>'+
    '</div>';
}

function newProblem(){
  prob=gen();buildUI(prob);
  window.scrollTo({top:0,behavior:'smooth'});
}
window.addEventListener('load',()=>newProblem());
window.addEventListener('resize',()=>{
  if(!prob)return;
  setTimeout(()=>{
    drawAccel('accelCanvas',prob.a1,prob.a2,prob.t1,prob.t2,prob.gt);
    prob.opts.forEach((_,i)=>{var c=document.getElementById('oc'+(i+1));if(c)drawForce(c,prob.opts[i].f1,prob.opts[i].f2,prob.t1,prob.t2);});
  },60);
});
</script>
