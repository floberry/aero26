<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>축전기 회로 문제 연습</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#ffffff;--surface:#ffffff;--surface2:#f5f5f7;--border:#d8d8dc;--text:#111111;
    --text-sub:#555555;--accent:#1a56db;--accent2:#1a9e5c;--warn:#d64545;
    --yellow:#b8860b;--purple:#7c4fd8;--radius:12px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;
    min-height:100vh;padding:16px;font-size:15px;line-height:1.6;}
  header{text-align:center;padding:20px 0 16px;border-bottom:1px solid var(--border);margin-bottom:20px;}
  header h1{font-size:18px;font-weight:700;color:var(--accent);}
  header p{font-size:12px;color:var(--text-sub);margin-top:4px;}
  .badge{display:inline-block;background:var(--surface2);border:1px solid var(--border);
    border-radius:20px;padding:2px 10px;font-size:11px;color:var(--text-sub);margin-top:6px;}
  .score-strip{display:flex;gap:8px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;}
  .score-pill{background:var(--surface2);border:1px solid var(--border);border-radius:20px;
    padding:4px 14px;font-size:12px;color:var(--text-sub);}
  .score-pill span{font-weight:700;color:var(--text);font-family:'JetBrains Mono',monospace;}
  .problem-box{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);
    padding:16px;margin-bottom:16px;font-size:14px;line-height:1.9;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .problem-box .val{background:rgba(26,86,219,.08);color:var(--accent);
    font-family:'JetBrains Mono',monospace;font-weight:600;padding:1px 6px;border-radius:4px;font-size:13px;}
  .circuits{display:flex;justify-content:center;margin-bottom:16px;
    background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 10px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .circuit-img{width:100%;max-width:560px;height:auto;display:block;}
  .bogi-section{background:var(--surface);border:1.5px solid var(--border);
    border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .bogi-title{font-size:13px;font-weight:700;color:var(--text-sub);margin-bottom:10px;
    display:flex;align-items:center;gap:8px;}
  .bogi-title::before{content:'';display:block;width:3px;height:14px;background:var(--yellow);border-radius:2px;}
  .bogi-inner{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
  .bogi-row{display:flex;align-items:center;gap:10px;
    padding:8px 0;border-bottom:1px solid var(--border);}
  .bogi-row:last-child{border-bottom:none;padding-bottom:0;}
  .bogi-row:first-child{padding-top:0;}
  .bogi-chip{flex-shrink:0;width:36px;height:36px;border-radius:50%;
    border:2px solid var(--border);background:var(--surface);color:var(--text-sub);
    font-size:15px;font-weight:700;cursor:pointer;transition:all .18s;
    display:flex;align-items:center;justify-content:center;
    -webkit-tap-highlight-color:transparent;font-family:'Noto Sans KR',sans-serif;user-select:none;}
  .bogi-chip:active{transform:scale(.88);}
  .bogi-chip.picked{border-color:var(--accent);background:rgba(88,166,255,.18);
    color:var(--accent);box-shadow:0 0 0 3px rgba(88,166,255,.18);}
  .bogi-chip.reveal-correct{border-color:var(--accent2)!important;background:rgba(63,185,80,.2)!important;
    color:var(--accent2)!important;box-shadow:0 0 0 3px rgba(63,185,80,.2)!important;}
  .bogi-chip.reveal-wrong{border-color:var(--warn)!important;background:rgba(247,129,102,.18)!important;
    color:var(--warn)!important;box-shadow:0 0 0 3px rgba(247,129,102,.15)!important;}
  .bogi-chip.reveal-missed{border-color:var(--accent2)!important;background:rgba(63,185,80,.08)!important;
    color:var(--accent2)!important;border-style:dashed!important;}
  .bogi-text{font-size:13px;color:var(--text);flex:1;line-height:1.85;}
  .bogi-text .val{color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;}
  .bogi-text .frac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);
    font-weight:600;margin:0 2px;line-height:1.2;}
  .bogi-text .frac .bar{border-top:1.5px solid var(--accent);width:100%;}
  .bogi-hint{font-size:11px;color:var(--text-sub);margin-top:6px;text-align:center;}
  .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .btn-primary,.btn-secondary{border:none;border-radius:10px;padding:14px;
    font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;
    cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s;letter-spacing:-.2px;}
  .btn-primary{background:var(--accent);color:#ffffff;}
  .btn-primary:active{transform:scale(.97);background:#1543ab;}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1.5px solid var(--border);}
  .btn-secondary:active{transform:scale(.97);}
  .feedback{display:none;background:var(--surface);border:1.5px solid var(--border);
    border-radius:var(--radius);padding:16px;margin-bottom:16px;font-size:13.5px;line-height:1.85;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .feedback.show{display:block;}
  .feedback-header{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .feedback-header.ok{color:var(--accent2);}
  .feedback-header.ng{color:var(--warn);}
  .feedback-section{margin-bottom:14px;}
  .feedback-section-title{font-size:12px;font-weight:700;color:var(--text-sub);
    letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .feedback-section-title::before{content:'';display:block;width:3px;height:12px;background:var(--accent);border-radius:2px;}
  .formula-chip{display:inline-block;background:rgba(188,140,255,.15);color:var(--purple);
    border:1px solid rgba(188,140,255,.3);border-radius:6px;padding:3px 10px;
    font-family:'JetBrains Mono',monospace;font-size:12px;margin:2px 3px;}
  .step-box{background:var(--surface2);border-radius:8px;padding:12px 14px;
    margin-bottom:8px;border-left:3px solid var(--border);}
  .step-box.good{border-left-color:var(--accent2);}
  .step-box.bad{border-left-color:var(--warn);}
  .step-box .kv{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:2px 0;}
  .step-box .kv .k{color:var(--text-sub);}
  .step-box .kv .v{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent);font-weight:600;}
  .tag-correct{color:var(--accent2);font-weight:700;}
  .tag-wrong{color:var(--warn);font-weight:700;}
  .ans-note{font-size:12px;color:var(--text-sub);margin-top:6px;}
  /* confetti */
  #confettiCanvas{position:fixed;inset:0;pointer-events:none;z-index:9000;display:none;}
  /* dancer */
  #danceOverlay{position:fixed;inset:0;display:none;align-items:flex-end;
    justify-content:center;pointer-events:none;z-index:9001;padding-bottom:60px;}
  #danceOverlay.show{display:flex;}
  #dancer{width:120px;filter:drop-shadow(0 8px 24px rgba(88,166,255,.5));animation:none;}
  #dancer.enter{animation:slideUp .4s ease forwards,danceBounce .45s .4s ease-in-out infinite alternate,danceSwing .9s .4s ease-in-out infinite;}
  #dancer.leave{animation:slideDown .4s ease forwards;}
  @keyframes slideUp{from{transform:translateY(160px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  @keyframes slideDown{from{transform:translateY(0);opacity:1;}to{transform:translateY(160px);opacity:0;}}
  @keyframes danceBounce{from{transform:translateY(0) scaleY(1) scaleX(1);}to{transform:translateY(-22px) scaleY(1.05) scaleX(.96);}}
  @keyframes danceSwing{0%{transform:rotate(-8deg);}50%{transform:rotate(8deg);}100%{transform:rotate(-8deg);}}
  #speechBubble{position:fixed;bottom:190px;left:50%;transform:translateX(-50%);
    background:#fff;color:#111;font-size:14px;font-weight:700;padding:8px 16px;
    border-radius:20px;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3);
    pointer-events:none;z-index:9002;opacity:0;transition:opacity .3s;}
  #speechBubble::after{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
    border:6px solid transparent;border-top-color:#fff;}
  #speechBubble.show{opacity:1;}
  #sadChar{width:120px;filter:drop-shadow(0 8px 24px rgba(247,129,102,.5));animation:none;}
  #sadChar.enter{animation:slideUp .4s ease forwards, sadShake 0.5s 0.4s ease-in-out 3;}
  #sadChar.leave{animation:slideDown .4s ease forwards;}
  @keyframes sadShake{
    0%{transform:rotate(0deg);}25%{transform:rotate(-6deg);}75%{transform:rotate(6deg);}100%{transform:rotate(0deg);}
  }
  @keyframes pillFlash{0%,100%{background:var(--surface2);}40%{background:rgba(63,185,80,.35);border-color:var(--accent2);}}
  .pill-flash{animation:pillFlash .7s ease;}

  /* ── 진행 표시 ── */
  .progress-bar-wrap{margin-bottom:16px;}
  .progress-label{display:flex;justify-content:flex-end;font-size:12px;
    color:var(--text-sub);margin-bottom:5px;font-weight:500;}
  .progress-track{height:6px;background:#e8e8ec;border-radius:99px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--accent);border-radius:99px;
    transition:width .4s ease;width:33.3%;}

  /* ── 결과 오버레이 ── */
  #resultOverlay{
    display:none;position:fixed;inset:0;z-index:9500;
    background:rgba(255,255,255,.92);backdrop-filter:blur(6px);
    align-items:center;justify-content:center;
  }
  #resultOverlay.show{display:flex;}
  .result-card{
    background:#fff;border:2px solid var(--border);border-radius:24px;
    padding:40px 32px 36px;text-align:center;max-width:340px;width:90%;
    box-shadow:0 16px 48px rgba(0,0,0,.12);
    animation:cardPop .45s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes cardPop{
    from{transform:scale(.7);opacity:0;}
    to{transform:scale(1);opacity:1;}
  }
  .result-emoji{font-size:64px;line-height:1;margin-bottom:12px;}
  .result-title{font-size:16px;font-weight:700;color:var(--text-sub);margin-bottom:20px;}
  .result-score-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;margin-bottom:12px;}
  .result-score-label{font-size:12px;color:var(--text-sub);}
  .result-score{font-size:52px;font-weight:800;color:var(--text);
    font-family:'JetBrains Mono',monospace;line-height:1;}
  .result-msg{font-size:17px;font-weight:700;margin-bottom:28px;line-height:1.4;}
  .btn-restart{
    background:var(--accent);color:#fff;border:none;
    border-radius:12px;padding:14px 28px;font-size:15px;font-weight:700;
    cursor:pointer;width:100%;font-family:'Noto Sans KR',sans-serif;
    -webkit-tap-highlight-color:transparent;transition:all .15s;
  }
  .btn-restart:active{transform:scale(.97);background:#1543ab;}

  /* ── 해설 상세 스타일 ── */
  .expl-block{background:#f8f8fa;border-radius:10px;padding:14px 16px;margin-top:8px;border-left:4px solid var(--border);}
  .expl-block.ok{border-left-color:var(--accent2);}
  .expl-block.ng{border-left-color:var(--warn);}
  .expl-row{display:flex;justify-content:space-between;align-items:baseline;
    font-size:13px;padding:3px 0;border-bottom:1px dashed #e0e0e8;}
  .expl-row:last-child{border-bottom:none;}
  .expl-row .ek{color:#555;flex:1;}
  .expl-row .ev{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:13px;text-align:right;}
  .expl-note{font-size:12px;color:#666;margin-top:8px;line-height:1.7;padding-top:6px;border-top:1px solid #e8e8ec;}
  .expl-conclusion{font-size:13px;font-weight:700;margin-top:6px;padding:6px 10px;
    background:rgba(26,86,219,.07);border-radius:6px;color:var(--accent);display:inline-block;}
  .expl-wrong{color:var(--warn)!important;}
  .formula-row{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0;}
</style>
</head>
<body>
<header>
  <h1>⚡ 축전기 회로</h1>
  <p>물리학 II · 전기와 자기</p>
  <span class="badge">2015 개정 교육과정</span>
</header>

<!-- 진행 표시 -->
<div class="progress-bar-wrap">
  <div class="progress-label"><span id="progressText">문제 1 / 3</span></div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div class="problem-box"><div id="probText"></div></div>
<div class="circuits">
  <img id="circuitImg" class="circuit-img" alt="(가) (나) 축전기 회로도" />

<div class="bogi-section">

  <button class="btn-primary" onclick="checkAnswer()">정답 확인</button>
  <button class="btn-secondary" onclick="newQuestion()">새 문제</button>
</div>
<div class="feedback" id="feedback"></div>

<!-- 결과 화면 오버레이 -->
<div id="resultOverlay">
  <div class="result-card">
    <div class="result-emoji" id="resultEmoji">🏆</div>
    <div class="result-title">3문제 완료!</div>
    <div class="result-score-wrap">
      <span class="result-score-label">맞춘 문제</span>
      <span class="result-score" id="resultScore">0 / 3</span>
    </div>
    <div class="result-msg" id="resultMsg">축하합니다!</div>
    <button class="btn-restart" onclick="restartSession()">🔄 다시 시작하기</button>

    <circle cx="106" cy="112" r="7" fill="#ffd700"/>
    <rect x="54" y="66" width="12" height="16" rx="5" fill="#ffd700"/>
    <ellipse cx="60" cy="52" rx="28" ry="26" fill="#ffd700"/>
    <ellipse cx="51" cy="48" rx="5" ry="6" fill="white"/>

</div>
<div id="speechBubble">🎉 완벽 정답!</div>

<script>
let state={};
let userPicked=[false,false,false];
let answered=false;
let totalQ=3, correctQ=0, currentQ=0; // 3문제 세션

// ── Generate: 랜덤 보기 생성 ─────────────────────────
function generate(){
  const C=[1,2,3,4,5,6][Math.floor(Math.random()*6)];
  const V=[4,6,8,10,12,16,20][Math.floor(Math.random()*7)];

  // 각 보기 참/거짓 랜덤 (최소 1개는 참)
  let gi,ni,di;
  do{
    gi=Math.random()<0.6;
    ni=Math.random()<0.6;
    di=Math.random()<0.6;
  }while(!gi&&!ni&&!di);

  // ㄱ: (가)에서 A 전하량
  // 참: CV, 거짓: 2CV 또는 CV/2 (정수 되는 경우만)
  const giTrue=C*V;
  let giFalseOpts=[C*V*2];
  if((C*V)%2===0) giFalseOpts.push(C*V/2);
  const giFalse=giFalseOpts[Math.floor(Math.random()*giFalseOpts.length)];
  const giVal=gi?giTrue:giFalse;

  // ㄴ: (나)에서 A 전압
  // 참: V/2, 거짓: V 또는 V/4 (정수 되는 경우만)
  const niTrue=V/2;
  let niFalseOpts=[V];
  if(V%4===0) niFalseOpts.push(V/4);
  const niFalse=niFalseOpts[Math.floor(Math.random()*niFalseOpts.length)];
  const niVal=ni?niTrue:niFalse;
  // 분수 표기
  function fracLabel(num,denom,val){
    if(denom===1) return `<span class="val">${val}V</span>`;
    return `<span class="frac"><span class="num">${num}</span><span class="bar"></span><span class="den">${denom}</span></span> = <span class="val">${val}V</span>`;
  }
  let niLabel;
  if(ni){ niLabel=fracLabel('V',2,niVal); }
  else if(niVal===V){ niLabel=`<span class="val">V = ${V}V</span>`; }
  else if(niVal===V/4){ niLabel=fracLabel('V',4,niVal); }
  else { niLabel=`<span class="val">${niVal}V</span>`; }

  // ㄷ: (가)와 (나)에서 A+B 전하량 합
  // 참: 같다, 거짓: (나)에서가 더 작다
  const diLabel=di?'같다':'(나)에서가 더 작다';

  state={C,V,
    correct:[gi,ni,di],
    Q_A_ga:C*V, Q_series:C*V/2, V_A_na:V/2,
    sum_ga:C*V, sum_na:C*V,
    gi,ni,di,
    giVal,giFalse:giFalse,giTrue,
    niVal,niLabel,
    diLabel,
  };
}

// ── 문제 텍스트 ──────────────────────────────────────
function renderProblem(){
  const{C,V}=state;
  document.getElementById('probText').innerHTML=
    `전기 용량이 <span class="val">${C}μF</span>으로 같은 두 개의 충전되지 않은 축전기 A, B와 `+
    `건전지를 사용한 회로를 나타낸 것이다. 그림 (가)와 같이 스위치를 왼쪽에 연결하여 `+
    `왼쪽 축전기를 충전시켜 양단의 전압이 <span class="val">${V}V</span>가 되게 한 뒤 `+
    `그림 (나)와 같이 스위치를 오른쪽에 연결하였다.`+
    `<br><br>이에 대한 설명으로 옳은 것만을 &lt;보기&gt;에서 있는 대로 고른 것은?`;
}

// ── 보기 렌더링 ──────────────────────────────────────
function renderBogi(){
  const{C,V,giVal,niLabel,diLabel}=state;
  const items=[
    {lbl:'ㄱ', html:`ㄱ. (가)에서 A에 충전된 전하량은 <span class="val">${giVal}μC</span>이다.`},
    {lbl:'ㄴ', html:`ㄴ. (나)에서 A 양단에 걸린 전압은 ${niLabel}이다.`},
    {lbl:'ㄷ', html:`ㄷ. (가)와 (나)에서 A, B에 충전된 전하량의 합은 ${diLabel}.`},
  ];
  const inner=document.getElementById('bogiInner');inner.innerHTML='';
  items.forEach((item,i)=>{
    const row=document.createElement('div');row.className='bogi-row';
    const chip=document.createElement('button');chip.className='bogi-chip';
    chip.textContent=item.lbl;chip.id=`chip${i}`;chip.onclick=()=>toggleChip(i);
    const textDiv=document.createElement('div');textDiv.className='bogi-text';
    textDiv.innerHTML=item.html;
    row.appendChild(chip);row.appendChild(textDiv);inner.appendChild(row);
  });
}
function toggleChip(i){
  if(answered)return;
  userPicked[i]=!userPicked[i];
  document.getElementById(`chip${i}`).classList.toggle('picked',userPicked[i]);
}

// ── 컨페티 ──────────────────────────────────────────
(function(){
  const canvas=document.getElementById('confettiCanvas');
  const ctx=canvas.getContext('2d');
  let particles=[],raf=null,running=false;
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  window.addEventListener('resize',resize);resize();
  const COLS=['#58a6ff','#3fb950','#e3b341','#bc8cff','#f78166','#79c0ff','#56d364','#ffa657','#fff'];
  window.launchConfetti=function(){
    resize();canvas.style.display='block';particles=[];
    for(let i=0;i<120;i++){
      particles.push({
        x:Math.random()*canvas.width,y:-10-Math.random()*80,
        vx:(Math.random()-.5)*4,vy:3+Math.random()*4,
        rot:Math.random()*360,rotV:(Math.random()-.5)*8,
        w:8+Math.random()*8,h:5+Math.random()*6,
        color:COLS[Math.floor(Math.random()*COLS.length)],
        life:1,decay:.008+Math.random()*.006,
        shape:Math.random()<.4?'circle':'rect'
      });
    }
    if(raf)cancelAnimationFrame(raf);running=true;loop();
  };
  function loop(){
    if(!running){canvas.style.display='none';return;}
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=false;
    particles.forEach(p=>{
      p.y+=p.vy;p.x+=p.vx;p.vy+=.06;p.rot+=p.rotV;p.life-=p.decay;
      if(p.life>0&&p.y<canvas.height+20)alive=true;
      ctx.save();ctx.globalAlpha=Math.max(0,p.life);
      ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;
      if(p.shape==='circle'){ctx.beginPath();ctx.arc(0,0,p.w/2,0,Math.PI*2);ctx.fill();}
      else{ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);}
      ctx.restore();
    });
    if(alive)raf=requestAnimationFrame(loop);else{running=false;canvas.style.display='none';}
  }
})();

// ── 댄싱 캐릭터 ─────────────────────────────────────
let danceTimer=null;
function startDance(){
  const overlay=document.getElementById('danceOverlay');
  const dancer=document.getElementById('dancer');
  const bubble=document.getElementById('speechBubble');
  const msgs=['🎉 완벽 정답!','✨ 대단해요!','🌟 완벽해!','💡 물리 천재!'];
  bubble.textContent=msgs[Math.floor(Math.random()*msgs.length)];
  bubble.style.background='#fff';bubble.style.color='#111';
  overlay.classList.add('show');dancer.style.display='block';
  document.getElementById('sadChar').style.display='none';
  dancer.className='enter';
  setTimeout(()=>bubble.classList.add('show'),500);
  if(danceTimer)clearTimeout(danceTimer);
  danceTimer=setTimeout(()=>{
    bubble.classList.remove('show');dancer.className='leave';
    setTimeout(()=>{overlay.classList.remove('show');dancer.className='';},400);
  },2800);
}

// ── 슬픈 캐릭터 ─────────────────────────────────────
function startSad(){
  const overlay=document.getElementById('danceOverlay');
  const sad=document.getElementById('sadChar');
  const bubble=document.getElementById('speechBubble');
  const msgs=['😢 다시 풀어보자!','💪 다음엔 맞출 수 있어!','🤔 다시 확인해볼까?'];
  bubble.textContent=msgs[Math.floor(Math.random()*msgs.length)];
  bubble.style.background='#fff';bubble.style.color='#111';
  overlay.classList.add('show');sad.style.display='block';
  document.getElementById('dancer').style.display='none';
  sad.className='enter';
  setTimeout(()=>bubble.classList.add('show'),500);
  if(danceTimer)clearTimeout(danceTimer);
  danceTimer=setTimeout(()=>{
    bubble.classList.remove('show');sad.className='leave';
    setTimeout(()=>{overlay.classList.remove('show');sad.className='';},400);
  },2200);
}

// ── 정답 확인 ────────────────────────────────────────
function checkAnswer(){
  if(!userPicked.some(p=>p)){alert('옳다고 생각하는 항목을 선택해주세요.');return;}
  if(answered)return;
  answered=true;
  const{correct}=state;
  const allOk=userPicked.every((p,i)=>p===correct[i]);
  if(allOk){correctQ++;launchConfetti();startDance();}else{startSad();}
  currentQ++;
  [0,1,2].forEach(i=>{
    const chip=document.getElementById(`chip${i}`);
    chip.classList.remove('picked');
    const should=correct[i],was=userPicked[i];
    if(should&&was)chip.classList.add('reveal-correct');
    else if(should&&!was)chip.classList.add('reveal-missed');
    else if(!should&&was)chip.classList.add('reveal-wrong');
  });
  renderFeedback(allOk);
  // 3문제 완료 시 결과 화면
  if(currentQ>=totalQ){
    setTimeout(()=>showResultScreen(),1200);
  }
}

// ── 해설 렌더링 ──────────────────────────────────────
function renderFeedback(allOk){
  const{C,V,correct,gi,ni,di,giVal,giTrue,niVal,Q_A_ga,Q_series,sum_ga,sum_na}=state;
  const results=userPicked.map((p,i)=>p===correct[i]);

  const ansLabels=[];
  if(gi)ansLabels.push('ㄱ');if(ni)ansLabels.push('ㄴ');if(di)ansLabels.push('ㄷ');
  const ansStr=ansLabels.length?ansLabels.join(', '):'해당 없음';

  const giHtml=`
    <div class="expl-block ${gi?'ok':'ng'}">
      <div class="expl-row"><span class="ek">상황</span><span class="ev">(가): 스위치 왼쪽 → A만 충전</span></div>
      <div class="expl-row"><span class="ek">A의 전기용량 C</span><span class="ev">${C} μF</span></div>
      <div class="expl-row"><span class="ek">A 양단 전압 V</span><span class="ev">${V} V</span></div>
      <div class="expl-row"><span class="ek">충전 전하량 Q = CV</span><span class="ev">${C} × ${V} = <strong>${giTrue} μC</strong></span></div>
      ${!gi?`<div class="expl-row"><span class="ek expl-wrong">보기 제시값</span><span class="ev expl-wrong">${giVal} μC → 틀림</span></div>`:''}
      <div class="expl-note">
        축전기의 기본 공식 <strong>Q = CV</strong>를 적용합니다.<br>
        (가)에서 스위치가 왼쪽에 연결되어 있으므로 건전지-A로만 회로가 형성됩니다.<br>
        B는 스위치에 연결되지 않아 충전되지 않습니다 (Q<sub>B</sub> = 0).<br>
        따라서 A에 충전된 전하량은 <strong>Q<sub>A</sub> = C × V = ${C} × ${V} = ${giTrue} μC</strong>입니다.
      </div>
      <div class="expl-conclusion">${gi?`✓ ${giVal} μC 은 옳습니다.`:`✗ 실제 전하량은 ${giTrue} μC, 제시된 ${giVal} μC은 틀렸습니다.`}</div>
    </div>`;

  const niHtml=`
    <div class="expl-block ${ni?'ok':'ng'}">
      <div class="expl-row"><span class="ek">상황</span><span class="ev">(나): 스위치 오른쪽 → A, B 직렬</span></div>
      <div class="expl-row"><span class="ek">A, B 전기용량 동일</span><span class="ev">각 ${C} μF</span></div>
      <div class="expl-row"><span class="ek">직렬 합성 전기용량</span><span class="ev">1/C합 = 1/${C} + 1/${C} → C합 = ${C/2} μF</span></div>
      <div class="expl-row"><span class="ek">각 축전기 전하량 Q</span><span class="ev">C합 × V = ${C/2} × ${V} = ${Q_series} μC</span></div>
      <div class="expl-row"><span class="ek">A 양단 전압 = Q ÷ C</span><span class="ev">${Q_series} ÷ ${C} = <strong>${V/2} V = V/2</strong></span></div>
      ${!ni?`<div class="expl-row"><span class="ek expl-wrong">보기 제시값</span><span class="ev expl-wrong">${niVal} V → 틀림</span></div>`:''}
      <div class="expl-note">
        (나)에서 스위치가 오른쪽에 연결되면 A와 B가 <strong>직렬</strong>로 연결됩니다.<br>
        직렬 연결 합성 전기용량: <strong>C합 = C/2 = ${C/2} μF</strong><br>
        직렬 회로에서 각 축전기의 전하량은 같으므로<br>
        Q = C합 × V = ${C/2} × ${V} = <strong>${Q_series} μC</strong><br>
        A 양단 전압: V<sub>A</sub> = Q ÷ C = ${Q_series} ÷ ${C} = <strong>V/2 = ${V/2} V</strong>
      </div>
      <div class="expl-conclusion">${ni?`✓ ${V/2} V (= V/2) 는 옳습니다.`:`✗ 실제 A의 전압은 ${V/2} V, 제시된 ${niVal} V는 틀렸습니다.`}</div>
    </div>`;

  const diHtml=`
    <div class="expl-block ${di?'ok':'ng'}">
      <div class="expl-row"><span class="ek">(가) Q<sub>A</sub> + Q<sub>B</sub></span><span class="ev">${Q_A_ga} + 0 = <strong>${sum_ga} μC</strong></span></div>
      <div class="expl-row"><span class="ek">(나) Q<sub>A</sub> + Q<sub>B</sub></span><span class="ev">${Q_series} + ${Q_series} = <strong>${sum_na} μC</strong></span></div>
      <div class="expl-row"><span class="ek">두 경우 비교</span><span class="ev">${sum_ga} μC ${sum_ga===sum_na?'=':'≠'} ${sum_na} μC → ${sum_ga===sum_na?'같음':'다름'}</span></div>
      <div class="expl-note">
        (가): A에만 ${Q_A_ga} μC 충전, B = 0 μC → 합계 = <strong>${sum_ga} μC</strong><br>
        (나): A와 B 직렬이므로 동일 전하량 공유, 각 ${Q_series} μC → 합계 = <strong>${sum_na} μC</strong><br><br>
        이는 <strong>전하량 보존 법칙</strong>으로 설명됩니다.<br>
        (가)에서 A에 충전된 ${Q_A_ga} μC이 스위치 전환 후<br>
        A와 B 사이에서 재분배되지만, 전하의 총량은 변하지 않습니다.
      </div>
      <div class="expl-conclusion">${di?`✓ 두 경우 전하량의 합은 모두 ${sum_ga} μC으로 같습니다.`:`✗ 실제로는 두 경우 모두 ${sum_ga} μC으로 같습니다.`}</div>
    </div>`;

  const fb=document.getElementById('feedback');
  fb.innerHTML=`
    <div class="feedback-header ${allOk?'ok':'ng'}">
      ${allOk?'✅ 정답!':'❌ 오답.'}&nbsp;&nbsp;정답: <strong>${ansStr}</strong>
    </div>
    <div class="feedback-section">
      <div class="feedback-section-title">📐 핵심 공식</div>
      <div class="formula-row">
        <span class="formula-chip">Q = CV</span>
      </div>
      <div style="font-size:12px;color:#555;margin-top:8px;line-height:2;padding:10px 12px;background:#f8f8fa;border-radius:8px;">
        <strong>Q</strong> : 전하량 (단위: C, 쿨롱 / 문제에서는 μC)<br>
        <strong>C</strong> : 전기용량 (단위: F, 패럿 / 문제에서는 μF)<br>
        <strong>V</strong> : 전압 (단위: V, 볼트)
      </div>
    </div>
    <div class="feedback-section">
      <div class="feedback-section-title">ㄱ &nbsp;<span class="${results[0]?'tag-correct':'tag-wrong'}">${results[0]?'✓ 맞음':'✗ 틀림'}</span>&nbsp;<span style="font-size:11px;color:#888">${gi?'[참]':'[거짓]'}</span></div>
      ${giHtml}
    </div>
    <div class="feedback-section">
      <div class="feedback-section-title">ㄴ &nbsp;<span class="${results[1]?'tag-correct':'tag-wrong'}">${results[1]?'✓ 맞음':'✗ 틀림'}</span>&nbsp;<span style="font-size:11px;color:#888">${ni?'[참]':'[거짓]'}</span></div>
      ${niHtml}
    </div>
    <div class="feedback-section">
      <div class="feedback-section-title">ㄷ &nbsp;<span class="${results[2]?'tag-correct':'tag-wrong'}">${results[2]?'✓ 맞음':'✗ 틀림'}</span>&nbsp;<span style="font-size:11px;color:#888">${di?'[참]':'[거짓]'}</span></div>
      ${diHtml}
    </div>`;
  fb.classList.add('show');
  if(currentQ<totalQ){
    setTimeout(()=>fb.scrollIntoView({behavior:'smooth',block:'start'}),100);
  }
}

// ── 결과 화면 ─────────────────────────────────────────
function showResultScreen(){
  const overlay=document.getElementById('resultOverlay');
  const scoreNum=document.getElementById('resultScore');
  const scoreMsg=document.getElementById('resultMsg');
  const resultEmoji=document.getElementById('resultEmoji');

  scoreNum.textContent=`${correctQ} / ${totalQ}`;

  if(correctQ===0){
    resultEmoji.textContent='😭';
    scoreMsg.textContent='아.. 안타깝습니다...';
    scoreMsg.style.color='#d64545';
  }else if(correctQ<=2){
    resultEmoji.textContent='😅';
    scoreMsg.textContent='아쉽습니다..';
    scoreMsg.style.color='#b8860b';
  }else{
    resultEmoji.textContent='🏆';
    scoreMsg.textContent='축하합니다! 당신은 물리 천재!';
    scoreMsg.style.color='#1a9e5c';
    launchConfetti();
  }
  overlay.classList.add('show');
}

function restartSession(){
  correctQ=0;currentQ=0;
  document.getElementById('resultOverlay').classList.remove('show');
  newQuestion();
}

// ── 새 문제 ──────────────────────────────────────────
function newQuestion(){
  userPicked=[false,false,false];answered=false;
  document.getElementById('feedback').classList.remove('show');
  document.getElementById('feedback').innerHTML='';
  updateProgress();
  generate();renderProblem();loadCircuitImage();renderBogi();
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateProgress(){
  const el=document.getElementById('progressText');
  const fill=document.getElementById('progressFill');
  const q=Math.min(currentQ+1,totalQ);
  if(el) el.textContent=`문제 ${q} / ${totalQ}`;
  if(fill) fill.style.width=`${(q/totalQ)*100}%`;
}

generate();renderProblem();loadCircuitImage();renderBogi();updateProgress();
</script>
