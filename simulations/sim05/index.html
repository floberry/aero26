<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🚁 대나무 헬리콥터 등속 원운동 연습</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Nanum+Pen+Script&display=swap');
  :root {
    --dora-blue:#0099CC; --accent:#FF6B35;
    --card:rgba(255,255,255,0.93);
    --shadow:0 4px 20px rgba(0,100,180,0.15);
    --radius:20px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nanum Gothic',sans-serif;background:linear-gradient(180deg,#a8e4ff 0%,#d4f1ff 40%,#e8f8e8 100%);min-height:100vh;overflow-x:hidden;padding-bottom:50px;}

  .cloud{position:fixed;background:white;border-radius:50px;opacity:0.65;animation:floatCloud linear infinite;pointer-events:none;z-index:0;}
  .cloud::before,.cloud::after{content:'';position:absolute;background:white;border-radius:50%;}
  .cloud-1{width:100px;height:35px;top:7%;animation-duration:26s;}
  .cloud-1::before{width:50px;height:50px;top:-25px;left:15px;}
  .cloud-1::after{width:35px;height:35px;top:-18px;left:45px;}
  .cloud-2{width:80px;height:28px;top:17%;animation-duration:36s;animation-delay:-11s;}
  .cloud-2::before{width:40px;height:40px;top:-20px;left:10px;}
  .cloud-2::after{width:28px;height:28px;top:-14px;left:38px;}
  .cloud-3{width:120px;height:40px;top:4%;animation-duration:30s;animation-delay:-19s;}
  .cloud-3::before{width:60px;height:60px;top:-30px;left:20px;}
  .cloud-3::after{width:40px;height:40px;top:-20px;left:58px;}
  @keyframes floatCloud{from{left:-160px;}to{left:110%;}}

  .header{position:relative;z-index:10;text-align:center;padding:22px 16px 12px;}
  .header-title{font-size:19px;font-weight:800;color:#004080;text-shadow:0 2px 4px rgba(0,100,200,0.18);}
  .header-sub{font-size:12px;color:#2277aa;margin-top:3px;font-weight:700;}

  .score-bar{position:relative;z-index:10;background:var(--card);border-radius:14px;margin:0 16px 10px;padding:11px 16px;display:flex;justify-content:space-around;box-shadow:var(--shadow);border:1.5px solid rgba(0,153,204,0.18);}
  .score-item{text-align:center;}
  .score-num{font-size:21px;font-weight:800;color:#003366;}
  .score-label{font-size:11px;color:#4488aa;font-weight:700;}
  .score-divider{width:1px;background:#cce8f8;}

  .animation-area{position:relative;z-index:10;margin:0 16px 10px;background:radial-gradient(ellipse at 50% 55%,#c8eeff 0%,#a0d8ef 60%,#7bbcd5 100%);border-radius:var(--radius);box-shadow:0 6px 24px rgba(0,80,160,0.18),inset 0 1px 0 rgba(255,255,255,0.6);overflow:hidden;border:2px solid rgba(255,255,255,0.8);}
  canvas#scene{display:block;width:100%;height:auto;}

  .card{position:relative;z-index:10;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin:0 16px 10px;padding:16px 14px;border:2px solid rgba(0,153,204,0.13);}
  .card-title{font-size:14px;font-weight:800;color:var(--dora-blue);margin-bottom:9px;display:flex;align-items:center;gap:5px;}
  .problem-text{font-size:13.5px;line-height:1.7;color:#1a2a3a;margin-bottom:12px;}
  .problem-text strong{color:#004080;}

  .params-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;}
  .param-badge{background:linear-gradient(135deg,#e8f6ff,#d0ecff);border:1.5px solid #99ccee;border-radius:11px;padding:9px 10px;text-align:center;}
  .param-label{font-size:11px;color:#5599bb;font-weight:700;margin-bottom:2px;}
  .param-value{font-size:15px;font-weight:800;color:#003366;}
  .param-unit{font-size:11px;color:#4488aa;font-weight:700;}

  .bokey-section{border:2px solid #bbddee;border-radius:13px;padding:11px 12px;margin-bottom:12px;background:#f5fbff;}
  .bokey-title{font-size:13px;font-weight:800;color:#336688;margin-bottom:9px;text-align:center;}
  .option-item{display:flex;align-items:flex-start;gap:9px;padding:8px 9px;border-radius:9px;margin-bottom:5px;border:2px solid #ddeef8;background:white;cursor:pointer;transition:all 0.18s;-webkit-tap-highlight-color:transparent;}
  .option-item:last-child{margin-bottom:0;}
  .option-item.selected{border-color:var(--dora-blue);background:#e0f4ff;}
  .option-check{width:21px;height:21px;border-radius:6px;border:2px solid #99bbcc;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;transition:all 0.18s;background:white;}
  .option-item.selected .option-check{background:var(--dora-blue);border-color:var(--dora-blue);color:white;}
  .option-key{font-weight:800;color:#004488;margin-right:3px;}
  .option-text{font-size:13px;line-height:1.5;color:#1a2a3a;flex:1;}

  .answer-label{font-size:13px;font-weight:800;color:#336688;margin-bottom:7px;}
  .answer-choices{display:flex;gap:6px;flex-wrap:wrap;}
  .answer-btn{flex:1;min-width:50px;padding:9px 3px;border-radius:11px;border:2px solid #bbddee;background:white;font-size:12px;font-weight:800;color:#336688;cursor:pointer;transition:all 0.18s;font-family:'Nanum Gothic',sans-serif;-webkit-tap-highlight-color:transparent;}
  .answer-btn.selected{background:var(--dora-blue);border-color:var(--dora-blue);color:white;box-shadow:0 3px 10px rgba(0,153,204,0.32);}

  .btn-row{display:flex;gap:9px;margin:0 16px 10px;position:relative;z-index:10;}
  .btn{flex:1;padding:14px 6px;border-radius:15px;border:none;font-family:'Nanum Gothic',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all 0.18s;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;gap:5px;}
  .btn:active{transform:scale(0.95);}
  .btn-new{background:linear-gradient(135deg,#FF6B35,#ff8c5a);color:white;box-shadow:0 4px 14px rgba(255,107,53,0.38);}
  .btn-check{background:linear-gradient(135deg,#0099CC,#22bbee);color:white;box-shadow:0 4px 14px rgba(0,153,204,0.38);}

  .result-card{position:relative;z-index:10;border-radius:var(--radius);margin:0 16px 10px;padding:16px 14px;display:none;animation:slideUp 0.32s ease;}
  .result-card.show{display:block;}
  @keyframes slideUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
  .result-correct{background:linear-gradient(135deg,#e8fff0,#ccffe0);border:2.5px solid #44cc77;}
  .result-wrong{background:linear-gradient(135deg,#fff3f0,#ffe4dd);border:2.5px solid #ff6644;}
  .result-header{font-size:19px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:7px;}
  .result-correct .result-header{color:#007722;}
  .result-wrong .result-header{color:#cc2200;}

  /* 정답: 도라에몽 축하 박스 */
  .dora-celebrate{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.75);border-radius:14px;padding:12px;margin-bottom:10px;}
  .celebrate-text{font-size:15px;font-weight:800;color:#004422;line-height:1.7;}
  .celebrate-sub{font-size:12px;color:#228855;font-weight:700;margin-top:3px;}

  /* 오답: 퉁퉁이 박스 */
  .tungtung-area{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.75);border-radius:14px;padding:12px;margin-bottom:10px;position:relative;overflow:hidden;}
  .tungtung-text{flex:1;}
  .tungtung-name{font-size:14px;font-weight:800;color:#cc3300;margin-bottom:4px;}
  .tungtung-song{font-size:13.5px;color:#884400;line-height:1.75;font-family:'Nanum Pen Script',cursive;}

  .wrong-note-title{font-size:13px;font-weight:800;color:#883300;margin-bottom:8px;display:flex;align-items:center;gap:5px;padding:6px 10px;background:rgba(255,200,150,0.4);border-radius:8px;}

  .solution-section{background:rgba(255,255,255,0.65);border-radius:12px;padding:12px;margin-top:10px;}
  .solution-title{font-size:12px;font-weight:800;color:#004466;margin-bottom:9px;border-bottom:1.5px dashed #aaccdd;padding-bottom:5px;}
  .solution-item{font-size:12.5px;line-height:1.75;color:#1a2a3a;margin-bottom:7px;padding:8px 10px;background:white;border-radius:8px;border-left:3px solid #0099CC;}
  .solution-item.correct-item{border-left-color:#44cc77;}
  .solution-item.wrong-item{border-left-color:#ee4444;}
  .tag{display:inline-block;padding:1px 7px;border-radius:5px;font-size:11px;font-weight:800;margin-right:5px;}
  .tag-o{background:#d0ffe0;color:#008833;}
  .tag-x{background:#ffe0e0;color:#cc2222;}

  /* 힌트(진구) 카드 */
  .hint-card{position:relative;z-index:10;background:linear-gradient(135deg,#fffef0,#fff8d8);border:2px solid #ffe27a;border-radius:var(--radius);margin:0 16px 10px;padding:14px;}
  .hint-card .card-title{color:#a87c00;}
  .hint-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;}
  .hint-row canvas{flex-shrink:0;border-radius:10px;background:rgba(255,255,255,0.55);}
  .hint-content{flex:1;display:flex;flex-direction:column;gap:8px;min-height:34px;justify-content:center;}
  .hint-placeholder{font-size:12.5px;color:#998800;font-weight:700;line-height:1.6;padding:6px 2px;}
  .hint-bubble{background:white;border:1.5px solid #ffe49a;border-radius:10px;padding:9px 11px;font-size:12.5px;line-height:1.65;color:#5a4400;animation:slideUp 0.3s ease;}
  .hint-num{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#FFB800;color:white;font-size:11px;font-weight:800;margin-right:6px;}
  .btn-hint{width:100%;background:linear-gradient(135deg,#FFB800,#ffd54f);color:#553d00;box-shadow:0 4px 14px rgba(255,184,0,0.32);padding:12px 8px;border-radius:14px;border:none;font-family:'Nanum Gothic',sans-serif;font-size:13.5px;font-weight:800;cursor:pointer;transition:all 0.18s;-webkit-tap-highlight-color:transparent;}
  .btn-hint:active{transform:scale(0.96);}
  .btn-hint.btn-disabled{background:linear-gradient(135deg,#ccc,#ddd);color:#777;cursor:default;box-shadow:none;}

  @keyframes noteFloat{0%{transform:translateY(0) rotate(-10deg);opacity:1;}100%{transform:translateY(-50px) rotate(20deg);opacity:0;}}
  .music-note{position:absolute;font-size:20px;animation:noteFloat 1.6s ease-out forwards;pointer-events:none;}
  @keyframes starPop{0%{transform:scale(0) rotate(0deg);opacity:1;}60%{transform:scale(1.4) rotate(200deg);opacity:1;}100%{transform:scale(0.7) rotate(360deg);opacity:0;}}
  .star-burst{position:absolute;font-size:22px;animation:starPop 0.9s ease-out forwards;pointer-events:none;}
</style>
</head>
<body>

<div class="cloud cloud-1"></div>
<div class="cloud cloud-2"></div>
<div class="cloud cloud-3"></div>

<div class="header">
  <div class="header-title">🚁 대나무 헬리콥터 물리 연습</div>
  <div class="header-sub">등속 원운동 · 물리학 II · 2015 개정 교육과정</div>
</div>

<div class="score-bar">
  <div class="score-item"><div class="score-num" id="score-total">0</div><div class="score-label">전체 문제</div></div>
  <div class="score-divider"></div>
  <div class="score-item"><div class="score-num" id="score-correct" style="color:#008833">0</div><div class="score-label">정답 🎉</div></div>
  <div class="score-divider"></div>
  <div class="score-item"><div class="score-num" id="score-wrong" style="color:#cc2222">0</div><div class="score-label">오답 😅</div></div>
  <div class="score-divider"></div>
  <div class="score-item"><div class="score-num" id="score-rate" style="color:#FF6B35">-</div><div class="score-label">정답률</div></div>
</div>

<div class="animation-area">
  <canvas id="scene" width="400" height="260"></canvas>
</div>

<div class="card">
  <div class="card-title">📋 문제</div>
  <div class="problem-text" id="problem-text"></div>
  <div class="params-grid" id="params-grid"></div>
  <div class="bokey-section">
    <div class="bokey-title">─── 보 기 ───</div>
    <div id="options-list"></div>
  </div>
  <div>
    <div class="answer-label">📌 정답 선택</div>
    <div class="answer-choices" id="answer-choices"></div>
  </div>
</div>

    text = isTrue ? '각속도는 p와 q가 같다' : `각속도는 p가 q보다 ${Math.random()<0.5?'크다':'작다'}`;
    explain = isTrue
      ? `p, q는 같은 주기 T=${T}s로 돌기 때문에 ω=2π/T ≈ <strong>${omega} rad/s</strong>로 서로 같다.`
      : `실제로는 각속도가 p, q 모두 ω=2π/T ≈ <strong>${omega} rad/s</strong>로 같다. 서로 다르다는 설명은 틀렸다.`;
  } else if(cat==='period'){
    text = isTrue ? '주기는 p와 q가 같다' : `주기는 p가 q보다 ${Math.random()<0.5?'크다':'작다'}`;
    explain = isTrue
      ? `p, q는 같은 대나무 헬리콥터 날개 위에 있으므로 주기는 항상 <strong>T=${T}s</strong>로 같다.`
      : `실제로는 주기가 p, q 모두 <strong>T=${T}s</strong>로 같다. 서로 다르다는 설명은 틀렸다.`;
  } else if(cat==='speed'){
    const word=propWord(isTrue);
    text = `속력은 p가 q보다 ${word}`;
    explain = `v=rω, r_p=${rP}m, r_q=${rQ}m → v_p=${vP}m/s, v_q=${vQ}m/s.`+(isTrue?' 실제 비교와 일치한다.':' 실제 크기 비교와 반대로 서술되어 틀렸다.');
  } else if(cat==='accel'){
    const word=propWord(isTrue);
    text = `구심 가속도의 크기는 p가 q보다 ${word}`;
    explain = `a=rω², r_p=${rP}m, r_q=${rQ}m → a_p=${aP}m/s², a_q=${aQ}m/s².`+(isTrue?' 실제 비교와 일치한다.':' 실제 크기 비교와 반대로 서술되어 틀렸다.');
  } else if(cat==='distance'){
    const word=propWord(isTrue);
    text = `한 주기 동안 p가 이동하는 거리는 q가 이동하는 거리보다 ${word}`;
    explain = `한 바퀴 이동 거리(둘레)=2πr → p: ${sP}m, q: ${sQ}m.`+(isTrue?' 실제 비교와 일치한다.':' 실제 크기 비교와 반대로 서술되어 틀렸다.');
  } else { // direction
    text = isTrue ? '가속도의 방향은 p와 q가 항상 같다' : '가속도의 방향은 속도의 방향과 나란하다';
    explain = isTrue
      ? `p, q는 같은 반지름 선 위에서 함께 회전하므로, 구심 가속도는 항상 같은 순간에 같은 방향(회전축 쪽)을 향한다.`
      : `구심 가속도는 항상 속도와 <strong>수직</strong>이며 회전축(중심) 방향을 향한다. 속도 방향과 나란하다는 설명은 틀렸다.`;
  }
  return {cat, isTrue, text, explain};
}

function generateQuestion() {
  const rOpts=[0.3,0.4,0.5,0.6,0.8,1.0,1.2,1.5];
  let i1=Math.floor(Math.random()*rOpts.length);
  let i2; do{ i2=Math.floor(Math.random()*rOpts.length); }while(i2===i1);
  if(Math.random()<0.5){ state.rP=rOpts[i1]; state.rQ=rOpts[i2]; } else { state.rP=rOpts[i2]; state.rQ=rOpts[i1]; }

  const Ts=[1.0,1.5,2.0,2.5,3.0];
  state.T=Ts[Math.floor(Math.random()*Ts.length)];
  const w=2*Math.PI/state.T;
  state.omega=w.toFixed(3);
  state.vP=(state.rP*w).toFixed(2); state.vQ=(state.rQ*w).toFixed(2);
  state.aP=(state.rP*w*w).toFixed(2); state.aQ=(state.rQ*w*w).toFixed(2);
  state.sP=(2*Math.PI*state.rP).toFixed(2); state.sQ=(2*Math.PI*state.rQ).toFixed(2);

  // ㄱ,ㄴ,ㄷ에 들어갈 주제를 매번 랜덤하게 3개 고르기
  const allCats=['omega','period','speed','accel','distance','direction'];
  const shuffledCats=allCats.map(c=>[Math.random(),c]).sort((a,b)=>a[0]-b[0]).map(x=>x[1]);
  const chosenCats=shuffledCats.slice(0,3);

  // 정답 보기(①~⑤)도 매번 랜덤하게 고르고, 그에 맞춰 각 문장의 참/거짓을 결정
  const letters=['①','②','③','④','⑤'];
  const patterns={'①':[true,false,false],'②':[false,true,false],'③':[true,true,false],'④':[false,true,true],'⑤':[true,true,true]};
  const targetLetter=letters[Math.floor(Math.random()*letters.length)];
  const truthPattern=patterns[targetLetter];

  state.correctAnswer=targetLetter;
  state.statements=chosenCats.map((cat,i)=>buildStatement(cat, truthPattern[i]));
}

function renderQuestion() {

    같은 주기로 등속 원운동한다.<br><br>
    p, q의 운동에 대한 설명으로 옳은 것만 &lt;보기&gt;에서 있는 대로 고른 것은?`;

  ).join('');

  const choices=[{val:'①',label:'① ㄱ'},{val:'②',label:'② ㄴ'},{val:'③',label:'③ ㄱ,ㄴ'},{val:'④',label:'④ ㄴ,ㄷ'},{val:'⑤',label:'⑤ ㄱ,ㄴ,ㄷ'}];
  document.getElementById('answer-choices').innerHTML=choices.map(c=>`<button class="answer-btn" id="ans-${c.val}" onclick="selectAnswer('${c.val}')">${c.label}</button>`).join('');

function toggleOption(key) {

function selectAnswer(val) {

let hintLevel=0;
function getHints(){
  const pBig = state.rP > state.rQ;
  const bigL = pBig ? 'p' : 'q';
  const smallL = pBig ? 'q' : 'p';
  return [
    `으... 나도 어렵다 ㅠㅠ 근데 같이 생각해보자! p랑 q는 같은 대나무 헬리콥터 날개에 붙어서 "같이" 빙글빙글 돌고 있어. 그럼 한 바퀴 도는 데 걸리는 시간(주기)은 둘이 같을까, 다를까? 🤔`,
    `맞아! 주기가 같으니까 1초당 도는 각도, 즉 <strong>각속도 ω</strong>도 서로 같아. 그런데 회전축에서 떨어진 거리(반지름)는 p가 ${state.rP}m, q가 ${state.rQ}m로 서로 다르지? (${bigL}가 회전축에서 더 멀어) 거리가 다르면 실제로 움직이는 "속력"이나 "휘어지는 정도(가속도)"는 같을까, 다를까?`,
    `좋아, 마지막 힌트야! 공식으로 정리해줄게 📐<br>
     각속도 <strong>ω = 2π / T</strong>, 주기 T → 반지름과 무관하게 p, q가 항상 같음<br>
     속력 <strong>v = rω</strong> → 반지름에 비례! r이 큰 ${bigL}가 더 빨라 (${smallL}가 더 느려)<br>
     구심가속도 <strong>a = rω²</strong> → 반지름에 비례! r이 큰 ${bigL}가 더 커 (${smallL}가 더 작아)<br>
     구심 가속도의 방향은 항상 회전축(중심) 쪽이고, p와 q는 같은 순간 항상 같은 방향을 향해!<br>
     이제 보기 ㄱ, ㄴ, ㄷ을 다시 살펴보고 정답을 골라봐!`
  ];
}
function requestHint(){
  const hints=getHints();
  if(hintLevel>=hints.length) return;
  const placeholder=document.getElementById('hint-placeholder');
  if(placeholder) placeholder.remove();
  const content=document.getElementById('hint-content');
  const bubble=document.createElement('div');
  bubble.className='hint-bubble';
  bubble.innerHTML=`<span class="hint-num">${hintLevel+1}</span>${hints[hintLevel]}`;
  content.appendChild(bubble);
  hintLevel++;
  const btn=document.getElementById('hint-btn');
  if(hintLevel>=hints.length){
    btn.textContent='💪 이제 풀어보자!';
    btn.classList.add('btn-disabled');
    btn.disabled=true;
  } else {
    btn.textContent=`💡 진구에게 힌트 더 받기 (${hintLevel+1}/${hints.length})`;
  }
}

function drawDoraeFace(canvas, bA){
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);

  // 배경
  const bg=ctx.createRadialGradient(W/2,H/2,5,W/2,H/2,W*0.7);
  bg.addColorStop(0,'#d4f4ff'); bg.addColorStop(1,'#a0d8ef');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  const cx=W/2, cy=H*0.52;
  const R=36; // 얼굴 반지름

  // ── 몸통 (파란 원형) ──
  ctx.beginPath(); ctx.arc(cx,cy+R*1.1,R*1.0,0,Math.PI*2);
  ctx.fillStyle='#0099CC'; ctx.fill();

  // 흰 배
  ctx.beginPath(); ctx.ellipse(cx,cy+R*1.35,R*0.58,R*0.52,0,0,Math.PI*2);
  ctx.fillStyle='#FAFAFA'; ctx.fill();
  // 배 테두리
  ctx.beginPath(); ctx.ellipse(cx,cy+R*1.35,R*0.58,R*0.52,0,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,120,180,0.25)'; ctx.lineWidth=1; ctx.stroke();

  // 포켓
  ctx.beginPath(); ctx.ellipse(cx,cy+R*1.45,R*0.4,R*0.28,0,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,100,160,0.4)'; ctx.lineWidth=1.5; ctx.stroke();

  // 다리
  ctx.fillStyle='#0099CC';
  ctx.beginPath(); ctx.ellipse(cx-R*0.35,cy+R*2.0,R*0.22,R*0.35,0.1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+R*0.35,cy+R*2.0,R*0.22,R*0.35,-0.1,0,Math.PI*2); ctx.fill();
  // 발 (흰 타원)
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.ellipse(cx-R*0.38,cy+R*2.28,R*0.3,R*0.15,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+R*0.38,cy+R*2.28,R*0.3,R*0.15,0,0,Math.PI*2); ctx.fill();

  // 팔 (양쪽)
  ctx.strokeStyle='#0099CC'; ctx.lineWidth=R*0.32; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx-R*0.9,cy+R*0.7); ctx.lineTo(cx-R*1.3,cy+R*1.2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+R*0.9,cy+R*0.7); ctx.lineTo(cx+R*1.3,cy+R*1.2); ctx.stroke();
  // 손 (흰 원)
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(cx-R*1.35,cy+R*1.25,R*0.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+R*1.35,cy+R*1.25,R*0.2,0,Math.PI*2); ctx.fill();

  // ── 얼굴 ──
  // 파란 머리 (반원)
  ctx.beginPath(); ctx.arc(cx,cy,R,Math.PI,0);
  ctx.fillStyle='#0099CC'; ctx.fill();

  // 흰 얼굴 원
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.fillStyle='#F5F5F5'; ctx.fill();
  // 파란 테두리 (머리)
  ctx.beginPath(); ctx.arc(cx,cy,R,Math.PI,0);
  ctx.fillStyle='#0099CC'; ctx.fill();
  // 얼굴 외곽선
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,80,140,0.3)'; ctx.lineWidth=1.5; ctx.stroke();

  // 눈 (흰자 - 크게 위로 튀어나온 느낌)
  // 왼쪽 눈
  ctx.beginPath(); ctx.arc(cx-R*0.32,cy-R*0.2,R*0.26,0,Math.PI*2);
  ctx.fillStyle='white'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx-R*0.32,cy-R*0.2,R*0.26,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=0.8; ctx.stroke();
  // 오른쪽 눈
  ctx.beginPath(); ctx.arc(cx+R*0.32,cy-R*0.2,R*0.26,0,Math.PI*2);
  ctx.fillStyle='white'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx+R*0.32,cy-R*0.2,R*0.26,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=0.8; ctx.stroke();

  // 눈동자
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath(); ctx.arc(cx-R*0.26,cy-R*0.18,R*0.13,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+R*0.36,cy-R*0.18,R*0.13,0,Math.PI*2); ctx.fill();
  // 눈 하이라이트
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(cx-R*0.21,cy-R*0.25,R*0.055,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+R*0.41,cy-R*0.25,R*0.055,0,Math.PI*2); ctx.fill();

  // 코 (빨간 동그라미, 얼굴 중앙)
  ctx.beginPath(); ctx.arc(cx,cy-R*0.02,R*0.15,0,Math.PI*2);
  ctx.fillStyle='#FF3333'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy-R*0.02,R*0.15,0,Math.PI*2);
  ctx.strokeStyle='rgba(180,0,0,0.2)'; ctx.lineWidth=0.5; ctx.stroke();
  // 코 하이라이트
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.arc(cx-R*0.04,cy-R*0.07,R*0.05,0,Math.PI*2); ctx.fill();

  // 입 (활짝 웃음 - 반원 크게)
  ctx.beginPath();
  ctx.arc(cx,cy+R*0.22,R*0.38,0.08,Math.PI-0.08);
  ctx.strokeStyle='#222'; ctx.lineWidth=2; ctx.stroke();
  // 입 안 (빨간색)
  ctx.beginPath();
  ctx.moveTo(cx-R*0.37,cy+R*0.22);
  ctx.arc(cx,cy+R*0.22,R*0.38,Math.PI,0,true);
  ctx.closePath();
  ctx.fillStyle='#cc2200'; ctx.fill();
  // 혀
  ctx.beginPath(); ctx.ellipse(cx,cy+R*0.52,R*0.2,R*0.1,0,0,Math.PI*2);
  ctx.fillStyle='#ff6666'; ctx.fill();

  // 볼 (분홍 원)
  ctx.beginPath(); ctx.arc(cx-R*0.72,cy+R*0.1,R*0.14,0,Math.PI*2);
  ctx.fillStyle='rgba(255,140,140,0.55)'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx+R*0.72,cy+R*0.1,R*0.14,0,Math.PI*2);
  ctx.fillStyle='rgba(255,140,140,0.55)'; ctx.fill();

  // 수염 (왼쪽 3개)
  ctx.strokeStyle='#222'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(cx-R*0.15,cy+R*0.05); ctx.lineTo(cx-R*0.95,cy-R*0.08); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx-R*0.15,cy+R*0.12); ctx.lineTo(cx-R*0.98,cy+R*0.12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx-R*0.15,cy+R*0.19); ctx.lineTo(cx-R*0.95,cy+R*0.32); ctx.stroke();
  // 수염 (오른쪽 3개)
  ctx.beginPath(); ctx.moveTo(cx+R*0.15,cy+R*0.05); ctx.lineTo(cx+R*0.95,cy-R*0.08); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+R*0.15,cy+R*0.12); ctx.lineTo(cx+R*0.98,cy+R*0.12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+R*0.15,cy+R*0.19); ctx.lineTo(cx+R*0.95,cy+R*0.32); ctx.stroke();

  // 방울 목걸이 (빨간 끈 + 금방울)
  ctx.strokeStyle='#CC0000'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(cx-R*0.82,cy+R*0.62); ctx.lineTo(cx+R*0.82,cy+R*0.62); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy+R*0.72,R*0.15,0,Math.PI*2);
  ctx.fillStyle='#FFD700'; ctx.fill();
  ctx.strokeStyle='#cc9900'; ctx.lineWidth=1; ctx.stroke();
  ctx.fillStyle='#886600';
  ctx.beginPath(); ctx.arc(cx,cy+R*0.72,R*0.06,0,Math.PI*2); ctx.fill();

  // 대나무 헬리콥터 (머리 위)
  const bx=cx, by=cy-R-10;
  ctx.strokeStyle='#5D8A3C'; ctx.lineWidth=2.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx,by+10); ctx.stroke();
  // 날개
  ctx.save(); ctx.translate(bx,by); ctx.rotate(bA);
  for(let i=0;i<4;i++){
    ctx.save(); ctx.rotate(Math.PI/2*i);
    ctx.beginPath(); ctx.ellipse(15,0,13,4.5,0.2,0,Math.PI*2);
    ctx.fillStyle='rgba(70,160,45,0.88)'; ctx.fill();
    ctx.strokeStyle='rgba(30,100,10,0.3)'; ctx.lineWidth=0.5; ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
  ctx.beginPath(); ctx.arc(bx,by,4.5,0,Math.PI*2); ctx.fillStyle='#7a5030'; ctx.fill();
}

// ════════════════════════════
// 퉁퉁이 (오답용) - 주황 터틀넥, 마이크, 입 벌려 노래
// ════════════════════════════
let tungtungAnimId=null;
let ttMouthT=0;
function animTungtung(){
  if(tungtungAnimId) cancelAnimationFrame(tungtungAnimId);
  function loop(){
    const c=document.getElementById('tungtung-canvas');
    if(!c){tungtungAnimId=null;return;}
    drawTungtung(c,ttMouthT);
    ttMouthT+=0.1;
    tungtungAnimId=requestAnimationFrame(loop);
  }
  loop();
}

function drawTungtung(canvas, t){
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);

  // 배경
  const bg=ctx.createRadialGradient(W/2,H/2,5,W/2,H/2,W*0.8);
  bg.addColorStop(0,'#fff5ee'); bg.addColorStop(1,'#ffddd0');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  const cx=W/2, headY=H*0.32, headR=26;

  // ── 몸통 (주황 터틀넥) ──
  // 몸
  ctx.beginPath();
  ctx.ellipse(cx,headY+headR*2.6,headR*1.4,headR*1.7,0,0,Math.PI*2);
  ctx.fillStyle='#E8721A'; ctx.fill();

  // 터틀넥 (목 부분 주황색 접힌 부분)
  ctx.beginPath();
  ctx.ellipse(cx,headY+headR*1.15,headR*0.6,headR*0.35,0,0,Math.PI*2);
  ctx.fillStyle='#D0620E'; ctx.fill();

  // 배 (살짝 밝은 부분)
  ctx.beginPath();
  ctx.ellipse(cx,headY+headR*2.5,headR*0.85,headR*1.1,0,0,Math.PI*2);
  ctx.fillStyle='#F08030'; ctx.fill();

  // 주머니 줄
  ctx.strokeStyle='rgba(150,60,0,0.4)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(cx-headR*0.5,headY+headR*2.1); ctx.lineTo(cx+headR*0.5,headY+headR*2.1); ctx.stroke();

  // 다리 (짧고 두꺼운)
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.ellipse(cx-headR*0.52,headY+headR*4.05,headR*0.42,headR*0.6,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+headR*0.52,headY+headR*4.05,headR*0.42,headR*0.6,0,0,Math.PI*2); ctx.fill();
  // 신발
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.ellipse(cx-headR*0.58,headY+headR*4.6,headR*0.55,headR*0.2,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+headR*0.58,headY+headR*4.6,headR*0.55,headR*0.2,0,0,Math.PI*2); ctx.fill();

  // 팔 (오른팔: 마이크를 입 가까이 / 왼팔: 위로 들어 손가락 펼침)
  ctx.strokeStyle='#E8721A'; ctx.lineWidth=headR*0.38; ctx.lineCap='round';
  // 오른팔 (마이크 쥐고 입 가까이)
  ctx.beginPath();
  ctx.moveTo(cx+headR*0.9,headY+headR*1.6);
  ctx.quadraticCurveTo(cx+headR*1.3,headY+headR*0.65, cx+headR*0.5,headY+headR*0.22);
  ctx.stroke();
  // 왼팔 (위로 들어 펼친 손)
  ctx.beginPath();
  ctx.moveTo(cx-headR*0.9,headY+headR*1.6);
  ctx.quadraticCurveTo(cx-headR*1.75,headY+headR*0.85, cx-headR*1.1,headY-headR*0.3);
  ctx.stroke();
  // 손 (오른 - 마이크 쥔 손)
  ctx.fillStyle='#F5C080';
  ctx.beginPath(); ctx.arc(cx+headR*0.55,headY+headR*0.18,headR*0.26,0,Math.PI*2); ctx.fill();
  // 손 (왼 - 손바닥 + 펼친 손가락)
  const palmX=cx-headR*1.12, palmY=headY-headR*0.32;
  ctx.beginPath(); ctx.arc(palmX,palmY,headR*0.24,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#F5C080'; ctx.lineWidth=headR*0.11; ctx.lineCap='round';
  for(let i=0;i<5;i++){
    const fAng=-1.65+(i-2)*0.27;
    ctx.beginPath();
    ctx.moveTo(palmX,palmY);
    ctx.lineTo(palmX+Math.cos(fAng)*headR*0.38, palmY+Math.sin(fAng)*headR*0.38);
    ctx.stroke();
  }

  // 마이크 (입 가까이)
  const micX=cx+headR*0.64, micY=headY+headR*0.0;
  ctx.save(); ctx.translate(micX,micY); ctx.rotate(-0.75);
  ctx.fillStyle='#888';
  ctx.beginPath(); ctx.ellipse(0,headR*0.3,headR*0.13,headR*0.3,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#333'; ctx.lineWidth=0.5; ctx.stroke();
  ctx.fillStyle='#BBBBBB';
  ctx.beginPath(); ctx.arc(0,-headR*0.05,headR*0.2,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#777'; ctx.lineWidth=0.7; ctx.stroke();
  ctx.strokeStyle='#888'; ctx.lineWidth=0.5;
  for(let i=-1;i<=1;i++){
    ctx.beginPath(); ctx.moveTo(i*headR*0.07,-headR*0.17); ctx.lineTo(i*headR*0.07,headR*0.07); ctx.stroke();
  }
  ctx.restore();

  // ── 얼굴 ──
  // 얼굴 (살색 - 둥글고 통통)
  ctx.beginPath(); ctx.ellipse(cx,headY,headR*1.05,headR,0,0,Math.PI*2);
  ctx.fillStyle='#F5C07A'; ctx.fill();
  ctx.strokeStyle='rgba(180,100,0,0.2)'; ctx.lineWidth=1; ctx.stroke();

  // 뺨 (양쪽 볼록)
  ctx.beginPath(); ctx.ellipse(cx-headR*0.88,headY+headR*0.1,headR*0.32,headR*0.26,0,0,Math.PI*2);
  ctx.fillStyle='#F5C07A'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+headR*0.88,headY+headR*0.1,headR*0.32,headR*0.26,0,0,Math.PI*2);
  ctx.fillStyle='#F5C07A'; ctx.fill();
  // 볼 홍조
  ctx.fillStyle='rgba(255,130,90,0.38)';
  ctx.beginPath(); ctx.arc(cx-headR*0.62,headY+headR*0.2,headR*0.22,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+headR*0.62,headY+headR*0.2,headR*0.22,0,Math.PI*2); ctx.fill();

  // 머리카락 (검정, 옆에 삐죽)
  ctx.fillStyle='#1a1a1a';
  // 중앙
  ctx.beginPath(); ctx.ellipse(cx,headY-headR*0.92,headR*0.18,headR*0.22,0,0,Math.PI*2); ctx.fill();
  // 왼쪽
  ctx.beginPath(); ctx.ellipse(cx-headR*0.35,headY-headR*0.9,headR*0.16,headR*0.2,-0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx-headR*0.65,headY-headR*0.82,headR*0.14,headR*0.18,-0.5,0,Math.PI*2); ctx.fill();
  // 오른쪽
  ctx.beginPath(); ctx.ellipse(cx+headR*0.35,headY-headR*0.9,headR*0.16,headR*0.2,0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+headR*0.65,headY-headR*0.82,headR*0.14,headR*0.18,0.5,0,Math.PI*2); ctx.fill();

  // 눈썹 (찡그린 V자)
  ctx.strokeStyle='#3a1a00'; ctx.lineWidth=2.2; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx-headR*0.62,headY-headR*0.42); ctx.lineTo(cx-headR*0.28,headY-headR*0.3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+headR*0.62,headY-headR*0.42); ctx.lineTo(cx+headR*0.28,headY-headR*0.3); ctx.stroke();

  // 눈 (감은 눈 - 노래에 몰입해서 눈 감음)
  ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=2.2; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(cx-headR*0.38,headY-headR*0.14,headR*0.16,0.08*Math.PI,0.92*Math.PI); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx+headR*0.38,headY-headR*0.14,headR*0.16,0.08*Math.PI,0.92*Math.PI); ctx.stroke();
  // 속눈썹 살짝
  ctx.lineWidth=1.4;
  ctx.beginPath(); ctx.moveTo(cx-headR*0.52,headY-headR*0.04); ctx.lineTo(cx-headR*0.58,headY+headR*0.02); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+headR*0.52,headY-headR*0.04); ctx.lineTo(cx+headR*0.58,headY+headR*0.02); ctx.stroke();

  // 코 (납작 넓적)
  ctx.fillStyle='#D4923A';
  ctx.beginPath(); ctx.ellipse(cx,headY+headR*0.04,headR*0.2,headR*0.13,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#8B5010';
  ctx.beginPath(); ctx.arc(cx-headR*0.1,headY+headR*0.07,headR*0.07,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+headR*0.1,headY+headR*0.07,headR*0.07,0,Math.PI*2); ctx.fill();

  // 입 (열창! 크게 벌리고 노래하며 혀 보임 - sin으로 움직임)
  const mOpen=0.26+Math.sin(t)*0.16;
  ctx.fillStyle='#7a2a00';
  ctx.beginPath(); ctx.ellipse(cx,headY+headR*0.36,headR*0.4,headR*(0.18+mOpen),0,0,Math.PI*2); ctx.fill();
  // 윗니
  ctx.fillStyle='#FFFFF0';
  ctx.fillRect(cx-headR*0.3,headY+headR*0.22,headR*0.26,headR*0.13);
  ctx.fillRect(cx+headR*0.04,headY+headR*0.22,headR*0.26,headR*0.13);
  // 혀 (둥글게 말려 늘어진 모양 - 항상 표시)
  ctx.fillStyle='#FF7878';
  ctx.beginPath();
  ctx.ellipse(cx,headY+headR*0.5+mOpen*headR*0.35,headR*0.2,headR*0.18+mOpen*headR*0.12,0,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle='rgba(200,60,60,0.35)'; ctx.lineWidth=0.7;
  ctx.beginPath(); ctx.moveTo(cx,headY+headR*0.4); ctx.lineTo(cx,headY+headR*0.62+mOpen*headR*0.3); ctx.stroke();

  // 땀방울 (오답 당황)
  ctx.fillStyle='rgba(100,180,255,0.8)';
  ctx.beginPath();
  ctx.moveTo(cx+headR*0.9,headY-headR*0.5);
  ctx.quadraticCurveTo(cx+headR*0.96,headY-headR*0.38,cx+headR*0.9,headY-headR*0.25);
  ctx.quadraticCurveTo(cx+headR*0.84,headY-headR*0.38,cx+headR*0.9,headY-headR*0.5);
  ctx.fill();
}

// ════════════════════════════
// 메인 씬 캔버스 (회전 애니메이션 + 작은 도라에몽)
// ════════════════════════════
const mainCanvas=document.getElementById('scene');
const mCtx=mainCanvas.getContext('2d');
let mainAnimId, mainAngle=0, mainBlade=0;

function startAnimation(){
  cancelAnimationFrame(mainAnimId);
  mainAngle=0; mainBlade=0;
  (function loop(){
    drawMainScene();
    mainBlade+=0.07;
    mainAngle+=(2*Math.PI/Math.max(state.T,0.1))*0.016;
    mainAnimId=requestAnimationFrame(loop);
  })();
}

function drawMainScene(){
  const W=mainCanvas.width, H=mainCanvas.height;
  mCtx.clearRect(0,0,W,H);
  const bg=mCtx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#a8e4ff'); bg.addColorStop(1,'#d4f4e8');
  mCtx.fillStyle=bg; mCtx.fillRect(0,0,W,H);

  // 오른쪽에 작은 도라에몽
  drawSmallDora(W*0.82, H*0.5, mainBlade);

  const oCx=W*0.41, oCy=H*0.5;
  const scale=Math.min(72/state.rQ,78);
  const rpx=state.rP*scale, rqx=state.rQ*scale;

  // 궤도
  mCtx.setLineDash([5,4]);
  mCtx.beginPath(); mCtx.arc(oCx,oCy,rqx,0,Math.PI*2); mCtx.strokeStyle='rgba(0,100,200,0.22)'; mCtx.lineWidth=1.5; mCtx.stroke();
  mCtx.beginPath(); mCtx.arc(oCx,oCy,rpx,0,Math.PI*2); mCtx.strokeStyle='rgba(200,80,0,0.22)'; mCtx.lineWidth=1.5; mCtx.stroke();
  mCtx.setLineDash([]);

  // 축
  mCtx.beginPath(); mCtx.arc(oCx,oCy,3.5,0,Math.PI*2); mCtx.fillStyle='rgba(0,60,120,0.5)'; mCtx.fill();
  // 작은 헬리콥터 날개 (축에)
  drawMiniCopter(oCx,oCy,mainBlade);

  // p, q 점
  const px=oCx+rpx*Math.cos(mainAngle), py=oCy+rpx*Math.sin(mainAngle);
  const qx=oCx+rqx*Math.cos(mainAngle), qy=oCy+rqx*Math.sin(mainAngle);

  // 반지름 선
  mCtx.beginPath(); mCtx.moveTo(oCx,oCy); mCtx.lineTo(px,py); mCtx.strokeStyle='rgba(255,100,50,0.2)'; mCtx.lineWidth=1; mCtx.stroke();
  mCtx.beginPath(); mCtx.moveTo(oCx,oCy); mCtx.lineTo(qx,qy); mCtx.strokeStyle='rgba(0,100,200,0.2)'; mCtx.lineWidth=1; mCtx.stroke();

  drawVelArrow(px,py,'#FF6B35',mainAngle);
  drawVelArrow(qx,qy,'#0077BB',mainAngle);
  drawDotLabel(px,py,'#FF6B35','p',oCx,oCy);
  drawDotLabel(qx,qy,'#0077BB','q',oCx,oCy);

  mCtx.font='bold 11px Nanum Gothic,sans-serif';
  mCtx.fillStyle='#336688'; mCtx.textAlign='center';
  mCtx.fillText(`T = ${state.T}s`, oCx, H-8);
}

function drawMiniCopter(cx,cy,bA){
  mCtx.save(); mCtx.translate(cx,cy-9); mCtx.rotate(bA);
  for(let i=0;i<4;i++){
    mCtx.save(); mCtx.rotate(Math.PI/2*i);
    mCtx.beginPath(); mCtx.ellipse(13,0,11,3.5,0.2,0,Math.PI*2);
    mCtx.fillStyle='rgba(80,160,50,0.85)'; mCtx.fill();
    mCtx.restore();
  }
  mCtx.restore();
  mCtx.strokeStyle='#5D8A3C'; mCtx.lineWidth=2.5; mCtx.lineCap='round';
  mCtx.beginPath(); mCtx.moveTo(cx,cy-9); mCtx.lineTo(cx,cy+6); mCtx.stroke();
  mCtx.beginPath(); mCtx.arc(cx,cy-9,3.5,0,Math.PI*2); mCtx.fillStyle='#7a4a1a'; mCtx.fill();
}

// 작은 도라에몽 (캔버스 우측)
function drawSmallDora(cx,cy,bA){
  const r=28;
  // 몸
  mCtx.beginPath(); mCtx.arc(cx,cy+r*0.85,r*0.82,0,Math.PI*2); mCtx.fillStyle='#0099CC'; mCtx.fill();
  // 배
  mCtx.beginPath(); mCtx.ellipse(cx,cy+r*1.1,r*0.52,r*0.45,0,0,Math.PI*2); mCtx.fillStyle='#F5F5F5'; mCtx.fill();
  // 파란 머리
  mCtx.beginPath(); mCtx.arc(cx,cy,r,Math.PI,0); mCtx.fillStyle='#0099CC'; mCtx.fill();
  // 흰 얼굴
  mCtx.beginPath(); mCtx.arc(cx,cy,r,0,Math.PI*2); mCtx.fillStyle='#F5F5F5'; mCtx.fill();
  mCtx.beginPath(); mCtx.arc(cx,cy,r,Math.PI,0); mCtx.fillStyle='#0099CC'; mCtx.fill();
  // 눈 흰자
  mCtx.fillStyle='white';
  mCtx.beginPath(); mCtx.arc(cx-r*0.3,cy-r*0.22,r*0.22,0,Math.PI*2); mCtx.fill();
  mCtx.beginPath(); mCtx.arc(cx+r*0.3,cy-r*0.22,r*0.22,0,Math.PI*2); mCtx.fill();
  // 눈동자
  mCtx.fillStyle='#111';
  mCtx.beginPath(); mCtx.arc(cx-r*0.24,cy-r*0.2,r*0.11,0,Math.PI*2); mCtx.fill();
  mCtx.beginPath(); mCtx.arc(cx+r*0.35,cy-r*0.2,r*0.11,0,Math.PI*2); mCtx.fill();
  // 눈 하이라이트
  mCtx.fillStyle='white';
  mCtx.beginPath(); mCtx.arc(cx-r*0.2,cy-r*0.26,r*0.05,0,Math.PI*2); mCtx.fill();
  mCtx.beginPath(); mCtx.arc(cx+r*0.39,cy-r*0.26,r*0.05,0,Math.PI*2); mCtx.fill();
  // 코
  mCtx.beginPath(); mCtx.arc(cx,cy-r*0.02,r*0.13,0,Math.PI*2); mCtx.fillStyle='#FF3333'; mCtx.fill();
  // 수염
  mCtx.strokeStyle='#333'; mCtx.lineWidth=0.8;
  [[-r*0.7,r*0.05],[-r*0.48,r*0.14],[-r*0.7,r*0.23]].forEach(([dx,dy])=>{
    mCtx.beginPath(); mCtx.moveTo(cx+dx,cy+dy); mCtx.lineTo(cx-r*0.18,cy+r*0.1); mCtx.stroke();
  });
  [[r*0.7,r*0.05],[r*0.48,r*0.14],[r*0.7,r*0.23]].forEach(([dx,dy])=>{
    mCtx.beginPath(); mCtx.moveTo(cx+dx,cy+dy); mCtx.lineTo(cx+r*0.18,cy+r*0.1); mCtx.stroke();
  });
  // 입
  mCtx.beginPath(); mCtx.arc(cx,cy+r*0.3,r*0.27,0.15,Math.PI-0.15); mCtx.strokeStyle='#333'; mCtx.lineWidth=1.3; mCtx.stroke();
  // 방울
  mCtx.beginPath(); mCtx.arc(cx,cy+r*0.66,r*0.12,0,Math.PI*2); mCtx.fillStyle='#FF3333'; mCtx.fill();
  mCtx.beginPath(); mCtx.arc(cx,cy+r*0.66,r*0.05,0,Math.PI*2); mCtx.fillStyle='#FFD700'; mCtx.fill();
  // 목줄
  mCtx.strokeStyle='#CC0000'; mCtx.lineWidth=2.2;
  mCtx.beginPath(); mCtx.moveTo(cx-r*0.78,cy+r*0.58); mCtx.lineTo(cx+r*0.78,cy+r*0.58); mCtx.stroke();
  // 볼
  mCtx.fillStyle='rgba(255,140,140,0.5)';
  mCtx.beginPath(); mCtx.arc(cx-r*0.68,cy+r*0.1,r*0.13,0,Math.PI*2); mCtx.fill();
  mCtx.beginPath(); mCtx.arc(cx+r*0.68,cy+r*0.1,r*0.13,0,Math.PI*2); mCtx.fill();
  // 헬리콥터 날개
  mCtx.save(); mCtx.translate(cx,cy-r-7); mCtx.rotate(bA);
  for(let i=0;i<4;i++){
    mCtx.save(); mCtx.rotate(Math.PI/2*i);
    mCtx.beginPath(); mCtx.ellipse(14,0,12,4,0.2,0,Math.PI*2);
    mCtx.fillStyle='rgba(70,155,45,0.85)'; mCtx.fill();
    mCtx.restore();
  }
  mCtx.restore();
  mCtx.strokeStyle='#5D8A3C'; mCtx.lineWidth=2.2; mCtx.lineCap='round';
  mCtx.beginPath(); mCtx.moveTo(cx,cy-r-7); mCtx.lineTo(cx,cy-r+5); mCtx.stroke();
  mCtx.beginPath(); mCtx.arc(cx,cy-r-7,3.5,0,Math.PI*2); mCtx.fillStyle='#8B5E3C'; mCtx.fill();
}

function drawVelArrow(x,y,color,ang){
  const vx=-Math.sin(ang)*15, vy=Math.cos(ang)*15;
  mCtx.beginPath(); mCtx.moveTo(x,y); mCtx.lineTo(x+vx,y+vy);
  mCtx.strokeStyle=color; mCtx.lineWidth=1.5; mCtx.setLineDash([3,2]); mCtx.stroke(); mCtx.setLineDash([]);
}
function drawDotLabel(x,y,color,label,ox,oy){
  mCtx.beginPath(); mCtx.arc(x,y,5.5,0,Math.PI*2); mCtx.fillStyle=color; mCtx.fill();
  mCtx.beginPath(); mCtx.arc(x,y,2.5,0,Math.PI*2); mCtx.fillStyle='white'; mCtx.fill();
  const lx=x+(x>mainCanvas.width*0.41?10:-10), ly=y+(y>mainCanvas.height/2?12:-8);
  mCtx.font='bold 12px Nanum Gothic,sans-serif'; mCtx.fillStyle=color; mCtx.textAlign='center';
  mCtx.fillText(label,lx,ly);
}
renderQuestion();
animNobita();
</script>
