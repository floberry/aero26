  header h1 { font-size: 1.05rem; font-weight: 700; color: var(--accent); letter-spacing: -0.3px; }
  header p { font-size: 0.72rem; color: var(--text2); margin-top: 2px; }
  .container { width: 100%; max-width: 480px; padding: 16px 14px 40px; display: flex; flex-direction: column; gap: 14px; }
  sup { font-size: 0.65em; vertical-align: super; line-height: 0; }
  sub { font-size: 0.65em; vertical-align: sub; line-height: 0; }

    50%      { transform: translateY(-8px); }
  }

  /* 공식 배너 */
  .formula-banner { background: linear-gradient(135deg, rgba(88,166,255,0.08), rgba(210,168,255,0.08)); border: 1px solid rgba(88,166,255,0.25); border-radius: 12px; padding: 12px 14px; }
  .formula-banner-title { font-size: 0.68rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .formula-row { display: flex; gap: 8px; align-items: center; }
  /* 마스코트 + 공식 가로 배치 */
  .formula-with-mascot { display: flex; align-items: center; gap: 12px; }
  .mascot-img { width: 160px; height: auto; flex-shrink: 0; }
  .f-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 7px 11px; display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; }
  .f-box .f-label { font-size: 0.58rem; color: var(--text2); }
  .f-box .f-eq { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--accent4); font-weight: 700; }
  .f-arrow { color: var(--accent4); font-size: 1rem; }

  /* 카드 */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .card-title { font-size: 0.72rem; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }

  /* 다이어그램 카드 - 가로 스크롤 래퍼 */
  .diagram-scroll-wrap {
    overflow-x: auto;
    overflow-y: visible;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    padding-bottom: 6px;
  }
  .diagram-scroll-wrap::-webkit-scrollbar { height: 4px; }
  .diagram-scroll-wrap::-webkit-scrollbar-track { background: transparent; }
  .diagram-scroll-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .diagram-inner {
    min-width: 340px;
    display: flex;
    gap: 8px;
    align-items: flex-start; /* stretch 대신 flex-start: 각 박스 높이 독립 */
  }

  .diagram-box {
    min-width: 140px;
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 6px 8px;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    /* 핵심: 박스 자체가 세로 스크롤 */
    max-height: 320px;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .diagram-box::-webkit-scrollbar { width: 3px; }
  .diagram-box::-webkit-scrollbar-track { background: transparent; }
  .diagram-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .diagram-label {
    font-size: 0.65rem; font-weight: 700; color: var(--text2);
    letter-spacing: 0.8px; text-transform: uppercase;
    position: sticky; top: 0; background: var(--surface2);
    width: 100%; text-align: center; padding-bottom: 4px; z-index: 1;
  }

  /* SVG: 너비 100%, 높이는 내용에 맞게 자동 */
  .cap-svg { width: 100%; max-width: 150px; height: auto; flex-shrink: 0; }

  /* 파라미터 표 */
  .param-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 6px; width: 100%; margin-top: 3px; }
  .param-item { font-size: 0.62rem; color: var(--text2); display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 3px; gap: 4px; }
  .param-item span:last-child { font-family: 'JetBrains Mono', monospace; color: var(--text); font-size: 0.65rem; white-space: nowrap; }
  .param-item.full { grid-column: 1 / -1; }

  .arrow-divider {
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 3px; color: var(--accent4);
    font-size: 1.2rem; padding: 0 2px; flex-shrink: 0; min-width: 32px;
    padding-top: 24px; /* diagram-label 높이만큼 내려서 중앙 정렬 */
  }
  .arrow-divider .change-text { font-size: 0.55rem; color: var(--accent4); text-align: center; line-height: 1.4; white-space: nowrap; }

  /* 문제 */
  .problem-text { font-size: 0.88rem; line-height: 1.8; color: var(--text); background: var(--surface2); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; padding: 12px 14px; }
  .problem-text .hl { color: var(--accent); font-weight: 700; font-family: 'JetBrains Mono', monospace; }

  /* 선택지 */
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .choice-btn { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; padding: 13px 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--text); cursor: pointer; transition: all 0.18s; text-align: center; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .choice-btn:active { transform: scale(0.97); }
  .choice-btn.selected { border-color: var(--accent); background: rgba(88,166,255,0.12); color: var(--accent); }
  .choice-btn.correct { border-color: var(--accent2); background: rgba(63,185,80,0.15); color: var(--accent2); }
  .choice-btn.wrong { border-color: var(--accent3); background: rgba(247,129,102,0.12); color: var(--accent3); }
  .choice-num { font-size: 0.62rem; opacity: 0.6; }

  /* 버튼 */
  .btn-row { display: flex; gap: 10px; }
  .btn { flex: 1; padding: 14px; border: none; border-radius: 10px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.88rem; font-weight: 700; cursor: pointer; transition: all 0.18s; letter-spacing: -0.2px; }
  .btn:active { transform: scale(0.97); }
  .btn-check { background: var(--accent); color: #0d1117; }
  .btn-check:disabled { background: var(--border); color: var(--text2); cursor: not-allowed; }
  .btn-new { background: var(--surface2); color: var(--text); border: 1.5px solid var(--border); }

  /* 풀이 */
  .solution-panel { display: none; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .solution-panel.show { display: block; }
  .sol-header { padding: 12px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); }
  .sol-badge { font-size: 0.72rem; font-weight: 700; padding: 3px 9px; border-radius: 20px; letter-spacing: 0.5px; }
  .sol-badge.correct { background: rgba(63,185,80,0.2); color: var(--accent2); }
  .sol-badge.wrong { background: rgba(247,129,102,0.2); color: var(--accent3); }
  .sol-title { font-size: 0.85rem; font-weight: 700; }
  .sol-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
  .sol-step { display: flex; gap: 10px; align-items: flex-start; }
  .sol-step-num { min-width: 22px; height: 22px; background: rgba(88,166,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; color: var(--accent); flex-shrink: 0; margin-top: 1px; }
  .sol-step-text { font-size: 0.82rem; line-height: 1.75; color: var(--text); }
  .sol-step-text .eq { font-family: 'JetBrains Mono', monospace; color: var(--accent4); font-size: 0.8rem; }
  .formula { font-family: 'JetBrains Mono', monospace; background: rgba(210,168,255,0.1); color: var(--accent4); padding: 2px 6px; border-radius: 4px; font-size: 0.78rem; }
  .sol-answer-box { background: rgba(63,185,80,0.08); border: 1px solid rgba(63,185,80,0.3); border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; color: var(--accent2); font-weight: 700; text-align: center; }

  /* 트로피 카드 */
  .trophy-card {
    background: linear-gradient(135deg, #1a1200, #1c1608, #201a00);
    border: 1.5px solid #f5a800;
    border-radius: 14px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .trophy-img { width: 54px; height: 54px; flex-shrink: 0; object-fit: contain; }
  .trophy-right { flex: 1; display: flex; flex-direction: column; gap: 2px; }
  .trophy-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2rem;
    font-weight: 900;
    color: #ffc200;
    line-height: 1;
    text-shadow: 0 0 12px rgba(255,194,0,0.4);
  }
  .trophy-label { font-size: 0.65rem; color: #b88a00; font-weight: 700; letter-spacing: 0.5px; }
  .trophy-streak {
    margin-top: 4px;
    font-size: 0.72rem;
    color: var(--accent4);
    font-weight: 700;
    min-height: 1.1em;
  }
  .trophy-delta {
    font-size: 0.78rem;
    font-weight: 900;
    padding: 2px 8px;
    border-radius: 20px;
    display: inline-block;
    margin-left: 6px;
    animation: pop 0.35s ease;
  }
  .trophy-delta.gain { background: rgba(63,185,80,0.2); color: var(--accent2); }
  .trophy-delta.lose { background: rgba(247,129,102,0.2); color: var(--accent3); }
  .trophy-delta.bonus { background: rgba(255,209,60,0.22); color: #ffd13c; }
  @keyframes pop {
    0%   { transform: scale(0.6); opacity: 0; }
    60%  { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(1); }
  }

  /* 스크롤 힌트 */
  .scroll-hint { font-size: 0.62rem; color: var(--text2); text-align: right; margin-top: 4px; display: none; }
  .scroll-hint.show { display: block; }

  /* 스토리 박스 */
  .story-box {
    background: linear-gradient(135deg, rgba(247,129,102,0.07), rgba(88,166,255,0.07));
    border: 1px solid rgba(247,129,102,0.3);
    border-radius: 10px;
    padding: 11px 13px;
    font-size: 0.82rem;
    line-height: 1.75;
    color: var(--text);
    margin-bottom: 10px;
  }
  .story-box .story-icon { font-size: 1rem; margin-right: 4px; }
  .story-box b { color: var(--accent3); }

  /* 결과 스토리 */
  .result-story {
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 0.84rem;
    line-height: 1.75;
    margin-bottom: 2px;
  }
  .result-story.win {
    background: linear-gradient(135deg, rgba(255,209,60,0.13), rgba(255,160,0,0.08));
    border: 1px solid rgba(255,209,60,0.45);
    color: var(--text);
  }
  .result-story.lose {
    background: linear-gradient(135deg, rgba(247,129,102,0.1), rgba(210,168,255,0.06));
    border: 1px solid rgba(247,129,102,0.35);
    color: var(--text);
  }
  .result-story .rs-title {
    font-size: 1.05rem;
    font-weight: 900;
    margin-bottom: 5px;
    display: block;
  }
  /* 스타플레이어 - 게임 스타일 노란 빛나는 텍스트 */
  .result-story.win .rs-title {
    color: #ffe033;
    text-shadow:
      0 0 6px #ffe033,
      0 0 14px #ffb300,
      0 0 28px #ff8c00,
      0 0 2px #fff;
    letter-spacing: 0.04em;
    animation: star-pulse 1.6s ease-in-out infinite;
  }
  @keyframes star-pulse {
    0%,100% { text-shadow: 0 0 6px #ffe033, 0 0 14px #ffb300, 0 0 28px #ff8c00, 0 0 2px #fff; }
    50%      { text-shadow: 0 0 12px #ffe033, 0 0 26px #ffb300, 0 0 48px #ff8c00, 0 0 4px #fff; }
  }
  .result-story.lose .rs-title { color: var(--accent3); }
</style>

<script>
// ── 옵션 풀 ─────────────────────────────────────────────
// C0 고정 = 1 μF
const D_OPTIONS = [
  { label: '½', num: 1, den: 2, val: 0.5  },
  { label: '¼', num: 1, den: 4, val: 0.25 },
  { label: '2', num: 2, den: 1, val: 2    },
  { label: '4', num: 4, den: 1, val: 4    },
];
const A_OPTIONS = [
  { label: '2', num: 2, den: 1, val: 2    },
  { label: '3', num: 3, den: 1, val: 3    },
  { label: '4', num: 4, den: 1, val: 4    },
  { label: '½', num: 1, den: 2, val: 0.5  },
  { label: '¼', num: 1, den: 4, val: 0.25 },
];
const V_OPTIONS = [10, 20, 40, 50, 100];

let state = {
  C0: 1, dOpt: null, aOpt: null, V: 10,
  C1: 0, Q_uC: 0,
  choices: [], answerIdx: -1, selected: -1, checked: false,
  // 트로피 시스템
  trophies: 0,      // 총 트로피
  streak: 0,        // 현재 연속 정답 수
  lastDelta: 0,     // 마지막 획득/손실
  lastBonus: 0,     // 마지막 보너스
};

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generateQuestion() {
  state.C0 = 1; // 항상 1 μF
  // d=4, A=¼ 조합(C'=1/16)은 계산이 복잡하므로 제외
  do {
    state.dOpt = pick(D_OPTIONS);
    state.aOpt = pick(A_OPTIONS);
  } while (state.dOpt.val === 4 && state.aOpt.val === 0.25);
  state.V    = pick(V_OPTIONS);
  state.C1   = state.C0 * (state.aOpt.val / state.dOpt.val);
  state.Q_uC = state.C1 * state.V;
}

function fracLabel(opt) { return opt.label + ' 배'; }

// 과학적 표기 (sup 태그)
function sci(val_uC) {
  if (val_uC <= 0) return '0 C';
  const val_C = val_uC * 1e-6;
  let exp = Math.floor(Math.log10(val_C));
  let coeff = val_C / Math.pow(10, exp);
  // 부동소수점 오차 제거: 소수점 6자리까지 반올림
  coeff = Math.round(coeff * 1e6) / 1e6;
  if (Math.abs(coeff - 10) < 1e-9) { coeff = 1; exp += 1; }
  // 정수이면 정수로, 소수 1자리이면 1자리로, 소수 2자리이면 2자리로 표기
  let cStr;
  if (Number.isInteger(coeff)) {
    cStr = coeff.toString();
  } else if (Number.isInteger(Math.round(coeff * 10) / 10) === false
             && Math.abs(coeff * 10 - Math.round(coeff * 10)) < 1e-6) {
    cStr = (Math.round(coeff * 10) / 10).toFixed(1);
  } else if (Math.abs(coeff * 100 - Math.round(coeff * 100)) < 1e-4) {
    cStr = (Math.round(coeff * 100) / 100).toFixed(2);
  } else {
    cStr = coeff.toFixed(2);
  }
  return cStr === '1' ? `1×10<sup>${exp}</sup> C` : `${cStr}×10<sup>${exp}</sup> C`;
}

// μF 표기
function cLabel(c_uF) {
  const r = Math.round(c_uF * 1000) / 1000;
  if (Number.isInteger(r)) return `${r} μF`;
  const fracs = [[1,2],[1,3],[2,3],[1,4],[3,4],[4,3],[3,2],[2,1],[4,1],[1,6],[6,1]];
  for (const [n,d] of fracs) {
    if (Math.abs(r - n/d) < 0.01) return `${n}/${d} μF`;
  }
  return `${r.toFixed(2)} μF`;
}

// 넓이 라벨 (변화 후)
function aLabel(aOpt) {
  if (aOpt.val === 1) return 'A';
  if (Number.isInteger(aOpt.val)) return `${aOpt.num}A`;
  return `A/${aOpt.den}`;
}

// 거리 라벨 (변화 후)
function dLabel(dOpt) {
  if (dOpt.val === 1) return 'd';
  if (dOpt.val > 1) return `${dOpt.num}d`;
  return `d/${dOpt.den}`;
}

// ── 변화 후 SVG 동적 렌더 ────────────────────────────────
function renderAfterSVG() {
  const d = state.dOpt.val;
  const a = state.aOpt.val;

  // viewBox 160 x 150 기준
  // 좌우 여백 14px씩(거리 라벨 영역 포함), 판 최대폭 = 160 - 14(왼쪽) - 28(오른쪽 거리표시 영역) = 118
  // 기본(1배): 판폭=106, 간격=46
  const baseGap = 46;
  const baseW   = 106;
  const leftX   = 14;     // 판 시작 x (고정)
  const maxW    = 118;    // 판 최대 폭 (오른쪽 거리표시 28px 확보)
  const minW    = 26;

  const newGap = Math.max(8, Math.min(78, Math.round(baseGap * d)));
  const newW   = Math.max(minW, Math.min(maxW, Math.round(baseW * a)));
  const newX   = leftX; // 항상 좌측 고정 → 우측에 거리 표시 공간 확보

  const topY = 14;
  const botY = topY + 13 + newGap;

  // 화살표
  const arrowCount   = Math.max(2, Math.min(8, Math.round(newW / 18)));
  const arrowSpacing = newW / (arrowCount + 1);
  let arrows = '';
  for (let i = 1; i <= arrowCount; i++) {
    const ax = newX + Math.round(arrowSpacing * i);
    const ay2 = botY - 1;
    if (ay2 > topY + 14) {
      arrows += `<line x1="${ax}" y1="${topY+13}" x2="${ax}" y2="${ay2}" stroke="#3fb950" stroke-width="1.5" marker-end="url(#a2)"/>`;
    }
  }

  // +/- 텍스트 (판 폭에 맞춰 글자 수 조절)
  const charCount = Math.max(2, Math.min(8, Math.round(newW / 14)));
  const plusStr   = Array(charCount).fill('+').join(' ');
  const minusStr  = Array(charCount).fill('–').join(' ');
  const textX     = newX + 5;

  // 거리 표시 (판 오른쪽, viewBox 160 안에 완전히 들어가도록)
  const distX    = newX + newW + 6;          // 판 끝 + 여백
  const distMidY = Math.round((topY + botY + 13) / 2) + 3;

  // 넓이 표시선 y (판 아래, 충분한 간격)
  const areaY      = botY + 13 + 10;
  const areaLabelY = areaY + 14;

  const dLab = dLabel(state.dOpt);
  const aLab = aLabel(state.aOpt);

  const svgInner = `
    <rect x="${newX}" y="${topY}" width="${newW}" height="13" rx="3" fill="#f78166" opacity="0.88"/>
    <text x="${textX}" y="${topY+10}" font-size="9" fill="#fff" font-family="monospace">${plusStr}</text>
    ${arrows}
    <rect x="${newX}" y="${botY}" width="${newW}" height="13" rx="3" fill="#58a6ff" opacity="0.88"/>
    <text x="${textX}" y="${botY+10}" font-size="9" fill="#fff" font-family="monospace">${minusStr}</text>
    <line x1="${distX}" y1="${topY}" x2="${distX}" y2="${botY+13}" stroke="#8b949e" stroke-width="1"/>
    <line x1="${distX-3}" y1="${topY}" x2="${distX+3}" y2="${topY}" stroke="#8b949e" stroke-width="1"/>
    <line x1="${distX-3}" y1="${botY+13}" x2="${distX+3}" y2="${botY+13}" stroke="#8b949e" stroke-width="1"/>
    <text x="${distX+5}" y="${distMidY}" font-size="9" fill="#8b949e" font-family="monospace" text-anchor="start">${dLab}</text>
    <line x1="${newX}" y1="${areaY}" x2="${newX+newW}" y2="${areaY}" stroke="#d2a8ff" stroke-width="1.3"/>
    <line x1="${newX}" y1="${areaY-4}" x2="${newX}" y2="${areaY+4}" stroke="#d2a8ff" stroke-width="1.3"/>
    <line x1="${newX+newW}" y1="${areaY-4}" x2="${newX+newW}" y2="${areaY+4}" stroke="#d2a8ff" stroke-width="1.3"/>
    <text x="${newX + newW/2}" y="${areaLabelY}" font-size="9.5" fill="#d2a8ff" font-family="monospace" text-anchor="middle">넓이 = ${aLab}</text>
  `;

  document.getElementById('after-svg').innerHTML =
    `<defs><marker id="a2" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#3fb950"/></marker></defs>` + svgInner;
}

// 스크롤 힌트: 내용이 컨테이너보다 넓을 때만 표시
function checkScrollHint() {
  const wrap = document.getElementById('diag-scroll');
  const hint = document.getElementById('scroll-hint');
  if (wrap.scrollWidth > wrap.clientWidth + 4) {
    hint.classList.add('show');
  } else {
    hint.classList.remove('show');
  }
}

function renderDiagram() {
  // 파라미터 표 (전기용량 없음, 넓이 있음)
  document.getElementById('v0-val').textContent = state.V + ' V';
  document.getElementById('v1-val').textContent = state.V + ' V';
  document.getElementById('d1-val').textContent = dLabel(state.dOpt);
  document.getElementById('a1-val').textContent = aLabel(state.aOpt);

  // 화살표 설명
  document.getElementById('change-desc').innerHTML =
    `간격<br>${fracLabel(state.dOpt)}<br>넓이<br>${fracLabel(state.aOpt)}`;

  // 변화 후 SVG
  renderAfterSVG();

  // 스크롤 힌트 체크 (렌더 후 약간 지연)
  setTimeout(checkScrollHint, 50);
}

function renderProblem() {
  const dStr = state.dOpt.label + ' 배';
  const aStr = state.aOpt.label + ' 배';
  document.getElementById('problem-text').innerHTML =
    `<div class="story-box">
      녹아웃 모드의 <b>8비트</b>가 대미지 증폭기를 가동하려 내부 축전기를 개조했다!
      판 간격을 <b>${dStr}</b>, 극판 넓이를 <b>${aStr}</b>로 변경.
    </div>
    개조 후 <span class="hl">${state.V} V</span>로 완전히 충전했을 때,
    <b>8비트가 모은 총 전하량 Q</b>는 얼마인가?
    <br><small style="color:var(--text2);font-size:0.75rem;">
      (초기 전기용량 C₀ = 1 μF, 1 μF = 1×10<sup>−6</sup> F)
    </small>`;
}

function generateChoices() {
  const correct = state.Q_uC;
  const C0 = state.C0, d = state.dOpt.val, a = state.aOpt.val, V = state.V;
  const cands = [
    C0 * V,
    C0 * a * V,
    C0 / d * V,
    state.C1 * V * 2,
    state.C1 * V / 2,
    C0 * (a * d) * V,
    C0 * V * (a / d) * 2,
    C0 * 2 * V,
    C0 * 4 * V,
  ];
  const wrongs = [];
  for (const c of cands) {
    if (c > 0 && Math.abs(c - correct) > 0.001
        && !wrongs.find(w => Math.abs(w - c) < 0.001)) wrongs.push(c);
    if (wrongs.length >= 4) break;
  }
  const extras = [0.1,0.5,1,2,5,10,15,20,25,30,40,50,60,80,100,150,200];
  for (const e of extras) {
    if (wrongs.length >= 4) break;
    if (Math.abs(e - correct) > 0.001 && !wrongs.find(w => Math.abs(w-e)<0.001)) wrongs.push(e);
  }
  const all = [correct, ...wrongs.slice(0,4)];
  for (let i = all.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [all[i],all[j]] = [all[j],all[i]];
  }
  state.choices   = all;
  state.answerIdx = all.indexOf(correct);
}

function renderChoices() {
  const container = document.getElementById('choices-container');
  container.innerHTML = '';
  const nums = ['①','②','③','④','⑤'];
  state.choices.forEach((val, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-num">${nums[i]}</span>${sci(val)}`;
    btn.onclick = () => selectChoice(i);
    container.appendChild(btn);
  });
}

function selectChoice(idx) {
  if (state.checked) return;
  state.selected = idx;
  document.querySelectorAll('.choice-btn').forEach((b,i) => b.classList.toggle('selected', i===idx));
  document.getElementById('check-btn').disabled = false;
}

function checkAnswer() {
  if (state.selected < 0 || state.checked) return;
  state.checked = true;
  const ok = state.selected === state.answerIdx;

  // 트로피 계산
  let delta;
  if (ok) {
    state.streak++;
    // 기본 8 + 연속 보너스: 연승 1회당 +1씩 누적, 최대 +10
    const bonus = Math.min(state.streak - 1, 10);
    state.lastBonus = bonus;
    delta = 8 + bonus;
  } else {
    state.streak = 0;
    state.lastBonus = 0;
    delta = -9;
  }
  state.trophies = Math.max(0, state.trophies + delta);
  state.lastDelta = delta;

  renderTrophy(delta, ok);

  document.querySelectorAll('.choice-btn').forEach((b,i) => {
    b.classList.remove('selected');
    if (i === state.answerIdx)               b.classList.add('correct');
    else if (i === state.selected && !ok)    b.classList.add('wrong');
  });
  document.getElementById('check-btn').disabled = true;
  showSolution(ok);
}

function renderTrophy(delta, ok) {
  document.getElementById('trophy-count').textContent = state.trophies;

  let streakMsg = '';
  let deltaH = '';

  if (ok) {
    const bonus = state.lastBonus;
    // 기본 +8 뱃지
    let badgeHTML = `<span class="trophy-delta gain">+8</span>`;
    // 보너스가 있으면 추가로 표시
    if (bonus > 0) {
      badgeHTML += `<span class="trophy-delta bonus" style="margin-left:6px;">+${bonus} 보너스</span>`;
    }
    if (state.streak >= 3)       streakMsg = `🔥 ${state.streak}연속 정답!`;
    else if (state.streak === 2) streakMsg = `⚡ 2연속 정답!`;
    else if (state.streak === 1) streakMsg = `✨ 정답!`;
    deltaH = badgeHTML;
  } else {
    streakMsg = '';
    deltaH = `<span class="trophy-delta lose">-9</span>`;
  }

  document.getElementById('trophy-streak').innerHTML = streakMsg
    + (streakMsg ? '&nbsp;' : '') + deltaH;
}

function showSolution(ok) {
  const panel = document.getElementById('solution-panel');
  panel.classList.add('show');
  const badge = document.getElementById('sol-badge');
  badge.className = 'sol-badge ' + (ok ? 'correct' : 'wrong');
  badge.textContent = ok ? '✓ 정답' : '✗ 오답';
  document.getElementById('sol-title').innerHTML = `정답: ${sci(state.Q_uC)}`;

  // 결과 이미지 토글
  const winImg    = document.getElementById('bit8-win-img');
  const loseImg   = document.getElementById('bit8-lose-img');
  if (winImg)   winImg.style.display   = ok ? 'block' : 'none';
  if (loseImg)  loseImg.style.display  = ok ? 'none'  : 'block';

  const C0 = state.C0, d = state.dOpt, a = state.aOpt;
  const C1 = state.C1, V = state.V, Q = state.Q_uC;

  const cRatio    = a.val / d.val;
  const cRatioStr = Number.isInteger(cRatio) ? cRatio.toString()
    : `${a.num * d.den}/${a.den * d.num}`;

  const C1_sci = (() => {
    const v  = C1 * 1e-6;
    const e  = Math.floor(Math.log10(v));
    let c    = v / Math.pow(10, e);
    c = Math.round(c * 1e6) / 1e6;
    if (Math.abs(c - 10) < 1e-9) { c = 1; }
    let cs;
    if (Number.isInteger(c)) {
      cs = c.toString();
    } else if (Math.abs(c * 10 - Math.round(c * 10)) < 1e-6) {
      cs = (Math.round(c * 10) / 10).toFixed(1);
    } else if (Math.abs(c * 100 - Math.round(c * 100)) < 1e-4) {
      cs = (Math.round(c * 100) / 100).toFixed(2);
    } else {
      cs = c.toFixed(2);
    }
    return cs === '1' ? `1×10<sup>${e}</sup>` : `${cs}×10<sup>${e}</sup>`;
  })();

  // 간추린 스토리텔링
  const bonusTxt = state.lastBonus > 0
    ? ` <span style="color:#ffd13c;">(+8 기본 +${state.lastBonus} 보너스)</span>`
    : '';
  const storyHTML = ok
    ? `<div class="result-story win">
        <span class="rs-title">🌟 스타플레이어</span>
        터렛이 완벽하게 가동되어 팀이 승리했다!
        <span style="color:#3fb950; font-weight:700;">+${state.lastDelta} 트로피</span>${bonusTxt}
      </div>`
    : `<div class="result-story lose">
        <span class="rs-title">💀 패배 <span style="color:#ff4d4d; font-size:1rem; margin-left:10px;">-9</span></span>
        터렛이 오작동했다… 정답은 ${sci(Q)}!
      </div>`;

  document.getElementById('sol-body').innerHTML = `
    ${storyHTML}
    <div class="sol-step">
      <div class="sol-step-num">1</div>
      <div class="sol-step-text">
        <b>개조 후 전기용량 변화</b> <span class="formula">C = ε<sub>0</sub>A/d</span><br>
        넓이 ${a.label}배(A→${aLabel(a)}), 간격 ${d.label}배(d→${dLabel(d)})<br>
        <span class="eq">C' = ε<sub>0</sub>·(${aLabel(a)})/(${dLabel(d)}) = ${cRatioStr}·C₀</span>
      </div>
    </div>
    <div class="sol-step">
      <div class="sol-step-num">2</div>
      <div class="sol-step-text">
        <b>개조 후 전기용량</b><br>
        <span class="eq">C' = ${cRatioStr} × ${C0} μF = ${cLabel(C1)} = ${C1_sci} F</span>
      </div>
    </div>
    <div class="sol-step">
      <div class="sol-step-num">3</div>
      <div class="sol-step-text">
        <b>8비트가 모은 총 전하량</b> <span class="formula">Q = C'V</span><br>
        <span class="eq">Q = ${C1_sci} F × ${V} V = ${sci(Q)}</span>
      </div>
    </div>
    <div class="sol-answer-box">
      ∴ 8비트의 총 전하량 Q = ${sci(Q)}
    </div>
  `;
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function newQuestion() {
  generateQuestion();
  generateChoices();
  renderDiagram();
  renderProblem();
  renderChoices();
  state.selected = -1; state.checked = false;
  document.getElementById('check-btn').disabled = true;
  document.getElementById('solution-panel').classList.remove('show');
  // 스트릭 메시지는 새 문제에서 지우되 트로피 수는 유지
  document.getElementById('trophy-streak').innerHTML = '';
  const winImg  = document.getElementById('bit8-win-img');
  const loseImg = document.getElementById('bit8-lose-img');
  if (winImg)    winImg.style.display    = 'none';
  if (loseImg)   loseImg.style.display   = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// 창 크기 변경 시 스크롤 힌트 재계산
window.addEventListener('resize', checkScrollHint);

newQuestion();
</script>
