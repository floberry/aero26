<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>사이키 쿠스오의 물리학</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#f0f4ff;font-family:'Noto Sans KR',sans-serif;display:flex;justify-content:center;min-height:100vh;}
.wrap{width:100%;max-width:480px;background:#fff;min-height:100vh;display:flex;flex-direction:column;}
.hdr{background:linear-gradient(135deg,#FF3D8A 0%,#FF7BAC 100%);padding:18px 20px 16px;position:relative;overflow:hidden;}
.hdr-psi{position:absolute;right:16px;top:8px;font-size:80px;font-weight:900;color:rgba(255,255,255,0.12);line-height:1;font-style:italic;}
.hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.hdr-icon{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid rgba(255,255,255,0.4);}
.hdr-title h1{font-size:18px;font-weight:900;color:#fff;}
.hdr-title p{font-size:11px;color:rgba(255,255,255,0.85);margin-top:2px;}
.hdr-tag{display:inline-block;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:#fff;font-size:11px;font-weight:600;padding:3px 12px;border-radius:20px;}
.main{flex:1;padding:16px 14px 100px;}
.prob-card{background:#fff;border-radius:16px;box-shadow:0 2px 20px rgba(255,61,138,0.12);overflow:hidden;margin-bottom:12px;}
.prob-head{display:flex;align-items:center;gap:10px;padding:14px 16px 12px;}
.prob-num{width:32px;height:32px;border-radius:50%;background:#FF3D8A;color:#fff;font-weight:900;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.prob-title{font-size:16px;font-weight:900;color:#1a1a1a;}
.prob-pts{margin-left:auto;color:#FF3D8A;font-size:13px;font-weight:700;}
.divider{height:1.5px;background:linear-gradient(90deg,#FFD6E8,#fff);margin:0 16px;}
.prob-body{padding:14px 16px;}
.prob-text{font-size:13.5px;line-height:1.9;color:#222;margin-bottom:14px;}
.prob-text em{font-style:italic;font-weight:700;}
.fig-wrap{border-radius:12px;overflow:hidden;margin-bottom:14px;border:1.5px solid #e8e8e8;background:linear-gradient(180deg,#87CEEB 0%,#B8E4F7 60%,#D4F0FF 100%);}
#physCanvas{display:block;width:100%;}
.bogi-box{border:2px solid #FF3D8A;border-radius:12px;padding:14px 14px 10px;margin-bottom:14px;position:relative;background:#FFFBFE;}
.bogi-tag{position:absolute;top:-12px;left:12px;background:#FF3D8A;color:#fff;font-size:11px;font-weight:900;padding:3px 12px;border-radius:8px;letter-spacing:1px;}
.bogi-item{font-size:13.5px;line-height:1.9;padding:7px 0;border-bottom:1px dashed #FFD6E8;color:#222;}
.bogi-item:last-child{border-bottom:none;padding-bottom:0;}
.bogi-lbl{font-weight:900;color:#FF3D8A;margin-right:6px;}
.frac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;font-size:12px;margin:0 2px;line-height:1.2;}
.frac-num{border-bottom:1.5px solid #222;padding:0 3px;}
.frac-den{padding:0 3px;}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.choice{background:#fff;border:1.5px solid #ddd;border-radius:10px;padding:13px 8px;font-size:14px;font-weight:600;color:#444;cursor:pointer;text-align:center;font-family:'Noto Sans KR',sans-serif;transition:all 0.15s;}
.choice:hover{border-color:#FF7BAC;color:#FF3D8A;background:#FFF0F6;}
.choice.sel{border-color:#FF3D8A;background:#FF3D8A;color:#fff;}
.choice.ok{border-color:#2e7d32;background:#2e7d32;color:#fff;}
.choice.ng{border-color:#c62828;background:#c62828;color:#fff;}
.choice:last-child{grid-column:1/-1;}
.feedback{display:none;border-radius:12px;overflow:hidden;margin-bottom:12px;}
.feedback.show{display:block;}
.fb-head{padding:13px 16px;font-size:15px;font-weight:900;}
.fb-head.ok{background:#E8F5E9;color:#2e7d32;}
.fb-head.ng{background:#FFEBEE;color:#c62828;}
.fb-body{background:#fafafa;border:1.5px solid #eee;border-top:none;border-radius:0 0 12px 12px;padding:13px 16px;font-size:12.5px;line-height:1.9;color:#333;}
.fb-body b{color:#FF3D8A;}
.sol-div{border:none;border-top:1px dashed #ddd;margin:7px 0;}
.streak{display:flex;align-items:center;gap:8px;padding:8px 16px 10px;background:#FFF5F9;}
.streak-lbl{font-size:11px;font-weight:700;color:#aaa;}
.streak-stars{font-size:16px;letter-spacing:1px;}
.streak-ct{margin-left:auto;font-size:12px;font-weight:900;color:#FF3D8A;}
.btn-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #eee;padding:12px 14px;display:flex;gap:10px;z-index:100;}
.btn{flex:1;padding:14px;border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.15s;}
.btn-new{background:linear-gradient(135deg,#FF3D8A,#FF7BAC);color:#fff;box-shadow:0 4px 14px rgba(255,61,138,0.35);}
.btn-check{background:#fff;color:#FF3D8A;border:2px solid #FF3D8A;}
#saikiOverlay{display:none;position:fixed;bottom:-280px;left:50%;transform:translateX(-50%);z-index:999;pointer-events:none;flex-direction:column;align-items:center;width:260px;}
#saikiOverlay.angry{display:flex;animation:popAngry 2.6s cubic-bezier(.17,.67,.31,1.4) forwards;}
#saikiOverlay.happy{display:flex;animation:popHappy 2.6s cubic-bezier(.17,.67,.31,1.4) forwards;}
.saiki-bubble{background:#fff;border:2.5px solid #FF3D8A;border-radius:12px;padding:9px 18px;font-size:14px;font-weight:900;color:#FF3D8A;white-space:nowrap;margin-bottom:10px;box-shadow:3px 3px 0 #FF3D8A;text-align:center;position:relative;}
.saiki-bubble::after{content:'';position:absolute;bottom:-13px;left:50%;transform:translateX(-50%);border-left:9px solid transparent;border-right:9px solid transparent;border-top:13px solid #FF3D8A;}
.saiki-bubble.ok-bub{border-color:#2e7d32;color:#2e7d32;box-shadow:3px 3px 0 #2e7d32;}
.saiki-bubble.ok-bub::after{border-top-color:#2e7d32;}
#saikiPhoto{width:240px;height:172px;object-fit:cover;object-position:top center;border-radius:14px 14px 0 0;border:2.5px solid #FF3D8A;border-bottom:none;}
@keyframes popAngry{0%{bottom:-280px;transform:translateX(-50%) scale(0.4) rotate(-4deg);}45%{bottom:0;transform:translateX(-50%) scale(1.1) rotate(2deg);}65%{bottom:-6px;transform:translateX(-50%) scale(1.0);}100%{bottom:0;transform:translateX(-50%) scale(1.0);}}
@keyframes popHappy{0%{bottom:-280px;transform:translateX(-50%) scale(0.4) rotate(3deg);}45%{bottom:0;transform:translateX(-50%) scale(1.04);}100%{bottom:0;transform:translateX(-50%) scale(1.0);}}
</style>
</head>

    <div class="hdr-psi">ψ</div>
    <div class="hdr-top">
      <div class="hdr-icon">⚛️</div>
      <div class="hdr-title">
        <h1>사이키 쿠스오의 물리학</h1>
        <p>돌림힘 심화 시뮬레이션</p>
      </div>
    </div>
    <span class="hdr-tag">고등학교 물리학 Ⅱ</span>

  <div class="main">

      <div class="prob-head">
        <div class="prob-num">4</div>

          <div class="bogi-item" id="bogiC"></div>

        <div class="choices" id="choices"></div>
        <div class="feedback" id="feedback">
          <div class="fb-head" id="fbHead"></div>
          <div class="fb-body" id="fbBody"></div>
        </div>
      </div>
      <div class="streak">
        <span class="streak-lbl">연속 정답</span>
        <span class="streak-stars" id="streakStars">☆☆☆☆☆</span>
        <span class="streak-ct" id="streakCt">0 / 0</span>
      </div>
    </div>
  </div>
  <div class="btn-bar">
    <button class="btn btn-new" id="newBtn">↺ 새로운 문제</button>
    <button class="btn btn-check" id="checkBtn">✓ 정답 확인</button>
  </div>
</div>

<script>
const ANGRY=["...틀렸다","한심하군","예상했다 (실망)","다시 풀어라","내 IQ 228이 민망하다","돌림힘도 모르냐","풀이나 봐라"];
const PRAISE=["...뭐, 맞겠지","당연한 결과다","잘했다 (무표정)","그나마 다행이군","맞는군. 놀랍지도 않다"];
let prob=null,sel=null,answered=false,streak=0,total=0;
function gcd(a,b){return b===0?a:gcd(b,a%b);}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

const VARIANTS=[{a:2,b:1},{a:3,b:1},{a:1,b:2},{a:3,b:2},{a:2,b:3},{a:4,b:1},{a:1,b:3}];

function fracHTML(num,den){
  const g=gcd(Math.abs(num),Math.abs(den)),n=num/g,d=den/g;
  if(d===1)return `<em>${n===1?'':n}F</em>`;
  return `<span class="frac"><span class="frac-num">${n===1?'':n}F</span><span class="frac-den">${d}</span></span>`;
}
function fracText(num,den){
  const g=gcd(Math.abs(num),Math.abs(den)),n=num/g,d=den/g;
  return d===1?(n===1?'':n)+'F':(n===1?'':n)+'F/'+d;
}

function genProb(){
  const v=pick(VARIANTS);const{a,b}=v;
  const stB=Math.random()>0.4, stC=Math.random()>0.4;
  const bNum=stB?b:b+a, bDen=stB?a:a;
  const cNum=stC?b:b+a, cDen=stC?a:a;
  const trues=['ㄱ'];
  if(stB)trues.push('ㄴ');
  if(stC)trues.push('ㄷ');
  const sorted=trues.slice().sort();
  const CHOICES=[
    {label:'① ㄱ',keys:['ㄱ']},{label:'② ㄴ',keys:['ㄴ']},
    {label:'③ ㄱ, ㄴ',keys:['ㄱ','ㄴ']},{label:'④ ㄴ, ㄷ',keys:['ㄴ','ㄷ']},
    {label:'⑤ ㄱ, ㄴ, ㄷ',keys:['ㄱ','ㄴ','ㄷ']},
  ];
  let ci=CHOICES.findIndex(c=>c.keys.length===sorted.length&&c.keys.every((k,i)=>k===sorted[i]));
  if(ci<0)ci=0;
  return{a,b,stB,stC,bNum,bDen,cNum,cDen,trues,ci,CHOICES};
}

// ══════════════════════════════════════════
//  DRAW SCENE
// ══════════════════════════════════════════
function drawScene(canvas, p){
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);

  // ── SKY ──
  const skyG=ctx.createLinearGradient(0,0,0,H-22);
  skyG.addColorStop(0,'#5BB8E8');skyG.addColorStop(0.5,'#90D0F0');skyG.addColorStop(1,'#C0E8F8');
  ctx.fillStyle=skyG; ctx.fillRect(0,0,W,H-22);

  // clouds
  function cloud(cx,cy,r){
    ctx.fillStyle='rgba(255,255,255,0.88)';
    [[0,0,r],[r*.9,r*.1,r*.7],[-r*.8,r*.1,r*.65],[r*1.6,r*.2,r*.55],[-r*1.5,r*.2,r*.5],[r*.8,-r*.35,r*.55]].forEach(([dx,dy,cr])=>{
      ctx.beginPath();ctx.arc(cx+dx,cy+dy,cr,0,Math.PI*2);ctx.fill();
    });
  }
  cloud(55,28,18);cloud(210,16,22);cloud(350,30,16);cloud(130,44,13);cloud(295,48,11);

  // ── LAYOUT ──
  // 어깨: 캐릭터 중심 x
  const sx=Math.round(W*0.46), groundY=H-22;
  // 막대 y: 어깨 높이
  const rodY=Math.round(H*0.36);
  // 단위 L (픽셀)
  const unitL=Math.min(46, (W*0.85)/(p.a+p.b+0.5));
  const leftEnd=sx-p.a*unitL, rightEnd=sx+p.b*unitL;

  // ── BUCKET ──
  const bx=leftEnd, by=rodY;
  // 로프
  ctx.strokeStyle='#555';ctx.lineWidth=1.8;
  ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx,by+18);ctx.stroke();
  // 손잡이
  ctx.beginPath();ctx.arc(bx,by+17,13,Math.PI,0);ctx.stroke();
  // 양동이 몸통
  const bktG=ctx.createLinearGradient(bx-14,0,bx+14,0);
  bktG.addColorStop(0,'#aaa');bktG.addColorStop(0.3,'#ddd');bktG.addColorStop(0.7,'#eee');bktG.addColorStop(1,'#bbb');
  ctx.fillStyle=bktG;ctx.strokeStyle='#888';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(bx-14,by+18);ctx.lineTo(bx+14,by+18);ctx.lineTo(bx+10,by+44);ctx.lineTo(bx-10,by+44);ctx.closePath();ctx.fill();ctx.stroke();
  // 테두리 선
  ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(bx-8,by+22);ctx.lineTo(bx-6,by+40);ctx.stroke();

  // ── DASHED ARC ──
  ctx.save();ctx.setLineDash([4,4]);ctx.strokeStyle='rgba(255,60,120,0.5)';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.arc(sx,rodY,p.a*unitL,Math.PI,0,false);ctx.stroke();
  ctx.restore();

  // ── SAIKI CHARACTER ──
  drawSaiki(ctx, sx, rodY, groundY);

  // ── ROD (앞에 그려서 어깨 위에 올라오게) ──
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.2)';ctx.shadowBlur=3;ctx.shadowOffsetY=2;
  ctx.lineCap='round';ctx.lineWidth=7;ctx.strokeStyle='#777';
  ctx.beginPath();ctx.moveTo(leftEnd,rodY);ctx.lineTo(rightEnd,rodY);ctx.stroke();
  ctx.restore();
  ctx.lineWidth=5;ctx.strokeStyle='#999';
  ctx.beginPath();ctx.moveTo(leftEnd,rodY);ctx.lineTo(rightEnd,rodY);ctx.stroke();
  // 하이라이트
  ctx.lineWidth=1.5;ctx.strokeStyle='rgba(255,255,255,0.6)';
  ctx.beginPath();ctx.moveTo(leftEnd,rodY-1);ctx.lineTo(rightEnd,rodY-1);ctx.stroke();

  // ── DISTANCE LABELS ──
  ctx.font=`italic bold ${Math.round(13)}px "Times New Roman",serif`;
  ctx.fillStyle='#111';ctx.textAlign='center';
  ctx.fillText(p.a>1?p.a+'L':'L', (leftEnd+sx)/2, rodY-10);
  ctx.fillText(p.b>1?p.b+'L':'L', (sx+rightEnd)/2, rodY-10);

  // ── F ARROW ──
  ctx.strokeStyle='#111';ctx.fillStyle='#111';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(rightEnd,rodY-36);ctx.lineTo(rightEnd,rodY-6);ctx.stroke();
  ctx.beginPath();ctx.moveTo(rightEnd,rodY+1);ctx.lineTo(rightEnd-5,rodY-11);ctx.lineTo(rightEnd+5,rodY-11);ctx.closePath();ctx.fill();
  ctx.font='italic bold 14px "Times New Roman",serif';ctx.textAlign='left';
  ctx.fillText('F',rightEnd+5,rodY-18);

  // ── W ARROW ──
  const wax=sx+2, waTop=rodY+22, waBot=rodY+48;
  ctx.strokeStyle='#111';ctx.fillStyle='#111';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(wax,waTop);ctx.lineTo(wax,waBot);ctx.stroke();
  ctx.beginPath();ctx.moveTo(wax,waBot+8);ctx.lineTo(wax-5,waBot);ctx.lineTo(wax+5,waBot);ctx.closePath();ctx.fill();
  ctx.font='italic bold 14px "Times New Roman",serif';ctx.textAlign='left';
  ctx.fillText('W',wax+6,waBot+5);

  // ── GROUND ──
  ctx.strokeStyle='#555';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(10,groundY);ctx.lineTo(W-10,groundY);ctx.stroke();
  ctx.strokeStyle='#888';ctx.lineWidth=1;
  for(let x=14;x<W-10;x+=12){ctx.beginPath();ctx.moveTo(x,groundY);ctx.lineTo(x-8,groundY+10);ctx.stroke();}
  ctx.font='11px "Noto Sans KR",sans-serif';ctx.fillStyle='#555';ctx.textAlign='right';
  ctx.fillText('지면',W-12,groundY-4);
}

function drawSaiki(ctx, sx, rodY, groundY){
  // 스케일: 캐릭터 전체 높이를 groundY - (rodY - 70) 에 맞춤
  const charH = groundY - (rodY - 70);
  const sc = Math.min(0.88, charH / 200);
  function s(v){return v*sc;}

  const feetY   = groundY - 2;
  const shoeH   = s(7);
  const legH    = s(68);
  const torsoH  = s(72);
  const neckH   = s(12);
  const headR   = s(22);

  const legTop   = feetY - shoeH - legH;
  const torsoTop = legTop - torsoH;
  const neckTop  = torsoTop - neckH;
  const headCY   = neckTop - headR * 0.75;
  const headCX   = sx;

  // ── LEGS ──
  const legG=ctx.createLinearGradient(sx-s(13),0,sx+s(13),0);
  legG.addColorStop(0,'#2CB5A8');legG.addColorStop(0.5,'#3DD6C8');legG.addColorStop(1,'#2CB5A8');
  ctx.fillStyle=legG;ctx.strokeStyle='#1a9088';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.roundRect(sx-s(13),legTop,s(11),legH-s(4),s(3));ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.roundRect(sx+s(2), legTop,s(11),legH-s(4),s(3));ctx.fill();ctx.stroke();

  const trues=['ㄱ'];if(stB)trues.push('ㄴ');if(stC)trues.push('ㄷ');
  const sorted=trues.slice().sort();
  const CH=[{label:'① ㄱ',keys:['ㄱ']},{label:'② ㄴ',keys:['ㄴ']},{label:'③ ㄱ, ㄴ',keys:['ㄱ','ㄴ']},{label:'④ ㄴ, ㄷ',keys:['ㄴ','ㄷ']},{label:'⑤ ㄱ, ㄴ, ㄷ',keys:['ㄱ','ㄴ','ㄷ']}];
  let ci=CH.findIndex(c=>c.keys.length===sorted.length&&c.keys.every((k,i)=>k===sorted[i]));
  if(ci<0)ci=0;
  return{a,b,stB,stC,bNum,bDen,cNum,cDen,trues,ci,CH};
}
function setupProblem(p){
  document.getElementById('qText').innerHTML=
    `그림과 같이 몸무게가 <em>W</em>인 사이키 쿠스오가 물통이 매달린 막대를 어깨에 걸치고 손으로 연직 아래 방향으로 크기가 <em>F</em>인 힘으로 눌렀더니 막대가 수평인 상태로 정지해 있었다. 이에 대한 설명으로 옳은 것만을 &lt;보기&gt;에서 있는 대로 고른 것은? <span style="color:#999;font-size:11.5px">(단, 막대의 질량은 무시한다.)</span>`;
  document.getElementById('bogiB').innerHTML=`<span class="bogi-lbl">ㄴ.</span>물통의 무게는 ${fracHTML(p.bNum,p.bDen)}이다.`;
  document.getElementById('bogiC').innerHTML=`<span class="bogi-lbl">ㄷ.</span>사이키가 지면을 누르는 힘의 크기는 <em>W</em> + ${fracHTML(p.cNum,p.cDen)}이다.`;
  const canvas=document.getElementById('physCanvas');
  canvas.width=440;canvas.height=300;
  drawScene(canvas,p);
}
function buildChoices(p){
  const w=document.getElementById('choices');w.innerHTML='';
  p.CH.forEach((c,i)=>{
    const b=document.createElement('button');b.className='choice';b.textContent=c.label;
    b.addEventListener('click',()=>doSel(i));w.appendChild(b);
  });
}
function doSel(i){
  if(answered)return;sel=i;
  document.querySelectorAll('.choice').forEach((b,j)=>b.classList.toggle('sel',i===j));
}
function doCheck(){
  if(answered)return;if(sel===null){alert('답을 선택해 주세요!');return;}
  answered=true;total++;const ok=sel===prob.ci;
  if(ok)streak++;else streak=0;updateStreak();
  document.querySelectorAll('.choice').forEach((b,i)=>{
    b.className='choice';
    if(i===prob.ci)b.classList.add('ok');
    else if(i===sel&&!ok)b.classList.add('ng');
  });
  const g=gcd(prob.b,prob.a),wN=prob.b/g,wD=prob.a/g;
  const sN=prob.b+prob.a,sg=gcd(sN,prob.a),sNr=sN/sg,sDr=prob.a/sg;
  document.getElementById('fbHead').textContent=ok?'✓ 정답! 사이키도 인정했다':'✗ 오답... 사이키가 화났다';
  document.getElementById('fbHead').className='fb-head '+(ok?'ok':'ng');
  document.getElementById('fbBody').innerHTML=`
    <div><b>돌림힘 평형 (어깨 기준):</b></div>
    <div>W<sub>물통</sub> × ${prob.a}L = F × ${prob.b}L &nbsp;→&nbsp; W<sub>물통</sub> = ${fracText(wN,wD)}</div>
    <hr class="sol-div">
    <div>어깨반력 S = ${fracText(wN,wD)} + F = ${fracText(sNr,sDr)}</div>
    <div>지면 반력 N = W + S − F = <b>W + ${fracText(wN,wD)}</b></div>
    <hr class="sol-div">
    <div>ㄱ. 물통 정지 → 알짜힘 = 0 <b style="color:#2e7d32">✔</b></div>
    <div>ㄴ. W<sub>물통</sub> = ${fracText(wN,wD)} → 보기 ${fracText(prob.bNum,prob.bDen)} <b style="color:${prob.stB?'#2e7d32':'#c62828'}">${prob.stB?'✔':'✘'}</b></div>
    <div>ㄷ. 지면반력 = W+${fracText(wN,wD)} → 보기 W+${fracText(prob.cNum,prob.cDen)} <b style="color:${prob.stC?'#2e7d32':'#c62828'}">${prob.stC?'✔':'✘'}</b></div>
    <hr class="sol-div">
    <div>정답: <b>${prob.CH[prob.ci].label}</b></div>`;
  document.getElementById('feedback').classList.add('show');
  showSaiki(ok);
}
function showSaiki(ok){
  const ov=document.getElementById('saikiOverlay');
  document.getElementById('saikiBubble').textContent=ok?pick(PRAISE):pick(ANGRY);
  document.getElementById('saikiBubble').className='saiki-bubble'+(ok?' ok-bub':'');
  document.getElementById('saikiPhoto').className=ok?'ok-b':'';
  ov.className='';void ov.offsetHeight;ov.className=ok?'happy':'angry';
  setTimeout(()=>ov.className='',3200);
}
function updateStreak(){
  document.getElementById('streakStars').textContent='★'.repeat(Math.min(streak,5))+'☆'.repeat(Math.max(0,5-streak));
  document.getElementById('streakCt').textContent=streak+' / '+total;
}
function newProb(){
  prob=genProb();sel=null;answered=false;
  document.getElementById('feedback').classList.remove('show');
  document.querySelectorAll('.choice').forEach(b=>b.className='choice');
  setupProblem(prob);buildChoices(prob);
}
window.addEventListener('resize',()=>{if(prob)setupProblem(prob);});
document.getElementById('newBtn').addEventListener('click',newProb);
document.getElementById('checkBtn').addEventListener('click',doCheck);
newProb();
</script>
</body>
</html>
